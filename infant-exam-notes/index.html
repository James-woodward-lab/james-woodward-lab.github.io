      if (prefix === CVS_FINDINGS_PREFIX && (key === 'hepatomegaly' || key === 'peripheralOedema')) syncCardiovascularNadPill();
      if (prefix === ABDOMEN_PERITONITIC_PREFIX && key === 'peritonitic') syncAbdomenNadPill();
      if (prefix === HEENT_ORAL_YN_PREFIX && key === 'pharyngealEry') syncHeentNadPill();
      if (prefix === HEENT_NECK_MENINGISM_PREFIX && (key === 'neckMovement' || key === 'appearsMeningitic')) syncHeentNadPill();
      updateOutput();
    }

    function buildSectionLine(section, abnormalCollector) {
      var phrases = [];
      for (var g = 0; g < section.groups.length; g++) {
        var group = section.groups[g];
        if (section.key === 'respiratory' && group.name === 'auscultationMode') continue;
        if (section.key === 'respiratory' && group.name === 'upperAirwayMode') {
          var airwayMode = document.querySelector('input[name="respiratory__upperAirwayMode"]:checked');
          if (airwayMode && airwayMode.value === 'No airway noises') {
            phrases.push(makeTaggedFinding('No added upper airway sounds', airwayMode.getAttribute('data-finding-tag') || resolveFindingTagLabel('No added upper airway sounds')));
          } else if (airwayMode && airwayMode.value === 'Upper airway sounds') {
            var uaChecked = document.querySelectorAll('input[id^="respiratory__upperAirwayFindings__"]:checked');
            for (var uac = 0; uac < uaChecked.length; uac++) {
              var uaTag = uaChecked[uac].getAttribute('data-finding-tag') || '';
              phrases.push(makeTaggedFinding(uaChecked[uac].value, uaTag));
            }
          }
          continue;
        }
        if (section.key === 'abdomen' && group.type === 'yesNoToggle') {
          var abPrfx = 'abdomen__peritonitic';
          for (var py = 0; py < group.rows.length; py++) {
            var rdef = group.rows[py];
            var yesEl = document.getElementById(abPrfx + '__' + rdef.key + '__yes');
            var noEl = document.getElementById(abPrfx + '__' + rdef.key + '__no');
            if (yesEl && yesEl.checked) phrases.push(makeTaggedFinding(rdef.yes, rdef.yesTag));
            else if (noEl && noEl.checked) phrases.push(makeTaggedFinding(rdef.no, rdef.noTag));
          }
          continue;
        }
        if (section.key === 'cardiovascular' && group.type === 'yesNoToggle') {
          var cvYnPrfx = 'cardiovascular__' + (group.name || 'femoral');
          for (var cfy = 0; cfy < group.rows.length; cfy++) {
            var crdef = group.rows[cfy];
            var cvYesEl = document.getElementById(cvYnPrfx + '__' + crdef.key + '__yes');
            var cvNoEl = document.getElementById(cvYnPrfx + '__' + crdef.key + '__no');
            if (cvYesEl && cvYesEl.checked) phrases.push(makeTaggedFinding(crdef.yes, crdef.yesTag));
            else if (cvNoEl && cvNoEl.checked) phrases.push(makeTaggedFinding(crdef.no, crdef.noTag));
          }
          continue;
        }
        if (section.key === 'neurology' && group.type === 'yesNoToggle') {
          var nYnPrfx = 'neurology__' + group.name;
          for (var nfy = 0; nfy < group.rows.length; nfy++) {
            var nrdef = group.rows[nfy];
            var nYesEl = document.getElementById(nYnPrfx + '__' + nrdef.key + '__yes');
            var nNoEl = document.getElementById(nYnPrfx + '__' + nrdef.key + '__no');
            if (nYesEl && nYesEl.checked) phrases.push(makeTaggedFinding(nrdef.yes, nrdef.yesTag));
            else if (nNoEl && nNoEl.checked) phrases.push(makeTaggedFinding(nrdef.no, nrdef.noTag));
          }
          continue;
        }
        if (section.key === 'neurology' && group.type === 'infantSpecific') {
          var fontPick = document.querySelector('input[name="neurology__fontanelle"]:checked');
          if (fontPick) {
            var fontTag = fontPick.getAttribute('data-finding-tag') || '';
            phrases.push(makeTaggedFinding(fontPick.value, fontTag));
          }
          var infantHeadPrfx = 'neurology__infantHead';
          for (var ih = 0; ih < NEURO_INFANT_HEAD_YN_ROWS.length; ih++) {
            var ihRow = NEURO_INFANT_HEAD_YN_ROWS[ih];
            var ihYesEl = document.getElementById(infantHeadPrfx + '__' + ihRow.key + '__yes');
            var ihNoEl = document.getElementById(infantHeadPrfx + '__' + ihRow.key + '__no');
            if (ihYesEl && ihYesEl.checked) phrases.push(makeTaggedFinding(ihRow.yes, ihRow.yesTag));
            else if (ihNoEl && ihNoEl.checked) phrases.push(makeTaggedFinding(ihRow.no, ihRow.noTag));
          }
          var refCbs = document.querySelectorAll('input[id^="neurology__primitiveReflexes__"]:checked');
          for (var rc = 0; rc < refCbs.length; rc++) {
            var refTag = refCbs[rc].getAttribute('data-finding-tag') || '';
            phrases.push(makeTaggedFinding(refCbs[rc].value, refTag));
          }
          continue;
        }
        if (section.key === 'respiratory' && group.type === 'respiratoryAccessoryYn') {
          var wobChk = document.querySelector('input[name="respiratory__wob"]:checked');
          if (wobChk && wobChk.value !== 'No WOB') {
            var rap = 'respiratory__accessory';
            for (var ray = 0; ray < group.rows.length; ray++) {
              var rdef = group.rows[ray];
              var yEl = document.getElementById(rap + '__' + rdef.key + '__yes');
              var nEl = document.getElementById(rap + '__' + rdef.key + '__no');
              if (rdef.key === 'recessions') {
                if (nEl && nEl.checked) phrases.push(makeTaggedFinding(rdef.no, rdef.noTag));
                else if (yEl && yEl.checked) {
                  var recessionTypes = [];
                  var subW = document.getElementById('recessionSubtypeWrap');
                  if (subW) {
                    var stCbs = subW.querySelectorAll('input[type="checkbox"]:checked');
                    for (var st = 0; st < stCbs.length; st++) recessionTypes.push(stCbs[st].value.toLowerCase());
                  }
                  if (recessionTypes.length > 0) {
                    var rphrase = recessionTypes.join(', ') + ' recessions';
                    phrases.push(makeTaggedFinding(rphrase, resolveFindingTagLabel(rphrase)));
                  }
                }
              } else {
                if (yEl && yEl.checked) phrases.push(makeTaggedFinding(rdef.yes, rdef.yesTag));
                else if (nEl && nEl.checked) phrases.push(makeTaggedFinding(rdef.no, rdef.noTag));
              }
            }
          }
          continue;
        }
        if (section.key === 'skin' && group.name === 'rash') {
          var rashPick = document.querySelector('input[name="skin__rash"]:checked');
          var rashDetailEl = document.getElementById('skin__rash_detail');
          var rashDetail = rashDetailEl ? trimSentence(rashDetailEl.value) : '';
          if (rashPick && rashPick.value === 'Rash (blanching)') {
            var pr = 'Blanching rash';
            if (rashDetail) pr += ' ' + rashDetail;
            phrases.push(makeTaggedFinding(pr, resolveFindingTagLabel(pr)));
          } else if (rashPick && rashPick.value === 'Rash (non-blanching)') {
            var pr2 = 'Non-blanching rash';
            if (rashDetail) pr2 += ' ' + rashDetail;
            phrases.push(makeTaggedFinding(pr2, resolveFindingTagLabel(pr2)));
          } else if (rashPick && rashPick.value === 'No rash') {
            phrases.push(makeTaggedFinding('No rash', resolveFindingTagLabel('No rash')));
          }
          continue;
        }
        if (section.key === 'skin' && group.name === 'bruising') {
          var bruPick = document.querySelector('input[name="skin__bruising"]:checked');
          var bruDetailEl = document.getElementById('skin__bruising_detail');
          var bruDetail = bruDetailEl ? trimSentence(bruDetailEl.value) : '';
          if (bruPick && bruPick.value === 'Bruising present') {
            var pb = 'Bruising';
            if (bruDetail) pb += ' ' + bruDetail;
            phrases.push(makeTaggedFinding(pb, resolveFindingTagLabel(pb)));
          } else if (bruPick && bruPick.value === 'No bruising') {
            phrases.push(makeTaggedFinding('No bruising', resolveFindingTagLabel('No bruising')));
          }
          continue;
        }
        if (section.key === 'skin' && group.name === 'colour') {
          var skinColPick = document.querySelector('input[name="skin__colour"]:checked');
          if (skinColPick) {
            var scVal = trimSentence(skinColPick.value);
            var toneFragment = scVal === 'No pallor' ? SKIN_NO_PALLOR_OUTPUT : scVal.charAt(0).toLowerCase() + scVal.slice(1);
            var skinColourPhrase = 'Skin: ' + toneFragment;
            var scTag = skinColPick.getAttribute('data-finding-tag') || '';
            phrases.push(makeTaggedFinding(skinColourPhrase, scTag || resolveFindingTagLabel(skinColourPhrase)));
          }
          continue;
        }
        var selector = group.type === 'radio'
          ? 'input[name="' + section.key + '__' + group.name + '"]:checked'
          : 'input[id^="' + section.key + '__' + group.name + '__"]:checked';
        var selected = document.querySelectorAll(selector);
        var vals = [];
        for (var s = 0; s < selected.length; s++) {
          var rawVal = trimSentence(selected[s].value);
          var mappedVal = OUTPUT_LABEL_MAP[rawVal] || rawVal;
          var rawTag = selected[s].getAttribute('data-finding-tag') || '';
          vals.push(makeTaggedFinding(mappedVal, rawTag));
        }
        if (section.key === 'respiratory' && group.name === 'wob' && vals.length > 0) {
          if (vals[0].text === 'No WOB') vals = [makeTaggedFinding('No increased WOB', vals[0].tag)];
          else vals = [makeTaggedFinding(vals[0].text + ' WOB', vals[0].tag)];
        }
        if (section.key === 'cardiovascular' && group.name === 'heartMurmur' && vals.length > 0 && vals[0].text === 'Murmur') {
          vals = [makeTaggedFinding('Murmur present', resolveFindingTagLabel('Murmur present'))];
          var murmurDetails = [];
          var timingInputs = document.querySelectorAll('input[id^="cardiovascular__murmurTiming__"]:checked');
          for (var ti = 0; ti < timingInputs.length; ti++) murmurDetails.push(timingInputs[ti].value.toLowerCase());
          var gradeInput = document.querySelector('input[name="cardiovascular__murmurGrade"]:checked');
          if (gradeInput) murmurDetails.push('grade ' + gradeInput.value);
          var locInputs = document.querySelectorAll('input[id^="cardiovascular__murmurLocation__"]:checked');
          var locVals = [];
          for (var li = 0; li < locInputs.length; li++) locVals.push(locInputs[li].value.toLowerCase());
          if (locVals.length) murmurDetails.push('at ' + locVals.join(', '));
          var radInputs = document.querySelectorAll('input[id^="cardiovascular__murmurRadiation__"]:checked');
          var radVals = [];
          for (var ri = 0; ri < radInputs.length; ri++) radVals.push(radInputs[ri].value.toLowerCase());
          if (radVals.length) murmurDetails.push('radiation ' + radVals.join(', '));
          var charInputs = document.querySelectorAll('input[id^="cardiovascular__murmurCharacter__"]:checked');
          var charVals = [];
          for (var ci = 0; ci < charInputs.length; ci++) charVals.push(charInputs[ci].value.toLowerCase());
          if (charVals.length) murmurDetails.push(charVals.join(', '));
          var pitchInputs = document.querySelectorAll('input[id^="cardiovascular__murmurPitch__"]:checked');
          var pitchVals = [];
          for (var pi = 0; pi < pitchInputs.length; pi++) pitchVals.push(pitchInputs[pi].value.toLowerCase() + '-pitched');
          if (pitchVals.length) murmurDetails.push(pitchVals.join(', '));
          if (murmurDetails.length) vals = [makeTaggedFinding('Murmur present (' + murmurDetails.join('; ') + ')', resolveFindingTagLabel('Murmur present'))];
        }
        if (section.key === 'perfusionHydration' && (group.name === 'crtCentral' || group.name === 'crtPeripheral') && vals.length > 0) {
          var crtMap = { '<2s': '<2 seconds', '2-3s': '2-3 seconds', '>3s': '>3 seconds' };
          var crtPhrase = crtMap[vals[0].text] || vals[0].text;
          var crtText = group.name === 'crtCentral' ? 'Central CRT ' + crtPhrase : 'Peripheral CRT ' + crtPhrase;
          vals = [makeTaggedFinding(crtText, resolveFindingTagLabel(crtText))];
        }
        if (section.key === 'abdomen' && group.name === 'tenderness' && vals.length > 0 && vals[0].text === 'Tender') {
          var tenderLoc = trimSentence(document.getElementById('abdomen__tender_location') ? document.getElementById('abdomen__tender_location').value : '');
          if (tenderLoc) vals = [makeTaggedFinding('Tender ' + tenderLoc, resolveFindingTagLabel('Tender ' + tenderLoc))];
        }
        if (section.key === 'abdomen' && group.name === 'tenderness' && vals.length > 0 && vals[0].text === 'Non-tender') {
          vals = [makeTaggedFinding('Non-tender', resolveFindingTagLabel('Non-tender'))];
        }
        if (vals.length > 0) {
          if (group.type === 'checkbox') {
            for (var vi = 0; vi < vals.length; vi++) phrases.push(vals[vi]);
          } else {
            var joinedText = [];
            for (var vj = 0; vj < vals.length; vj++) joinedText.push(vals[vj].text);
            phrases.push(makeTaggedFinding(joinedText.join(', '), vals[0].tag));
          }
        }
      }

      var freeText = trimSentence(document.getElementById(section.key + '__free').value);
      if (freeText) freeText = sentenceCase(freeText);
      if (phrases.length === 0 && !freeText) return { line: '', severity: 'normal' };
      var ordered = reorderPhrases(phrases);
      if (freeText) ordered.push(makeTaggedFinding(freeText, 'free-text'));
      var lineBody = formatFindingsLine(ordered, abnormalCollector, section.key);
      return { line: withSectionPrefix(section.key, lineBody, getSeverityFromFindings(ordered)), severity: getSeverityFromFindings(ordered) };
    }

    function updateOutput() {
      var lines = [];
      var abnormalCollector = [];
      var sectionMap = {};
      for (var si = 0; si < SECTIONS.length; si++) sectionMap[SECTIONS[si].key] = SECTIONS[si];
      for (var oi = 0; oi < OUTPUT_SECTION_KEYS.length; oi++) {
        var skey = OUTPUT_SECTION_KEYS[oi];
        if (skey === '_heent_') {
          var heentOut = getHeentOutputLines(abnormalCollector);
          for (var hl = 0; hl < heentOut.lines.length; hl++) lines.push(heentOut.lines[hl]);
          continue;
        }
        if (skey === '_msk_') {
          var mskOut = getMskOutputLines(abnormalCollector);
          for (var ml = 0; ml < mskOut.lines.length; ml++) lines.push(mskOut.lines[ml]);
          continue;
        }
        var sec = sectionMap[skey];
        if (!sec) continue;
        var built = buildSectionLine(sec, abnormalCollector);
        var line = built.line;
        var lineSeverity = built.severity;
        if (skey === 'respiratory') {
          if (line) lines.push(line);
          var ausLine = getRespiratoryAuscultationLine(abnormalCollector);
          if (ausLine) lines.push(ausLine);
          var lungLine = getLungSummaryLine(abnormalCollector);
          if (lungLine) lines.push(lungLine);
        } else {
          if (line) {
            if (skey === 'cardiovascular' && OUTPUT_SECTION_PREFIX_MAP.cardiovascular === '') {
              if (lines.length > 0 && OUTPUT_SECTION_PREFIX_MAP.perfusionHydration) {
                var perfIdx = -1;
                for (var pi = lines.length - 1; pi >= 0; pi--) {
                  if (lines[pi].indexOf(OUTPUT_SECTION_PREFIX_MAP.perfusionHydration + ':') !== -1 || lines[pi].indexOf('⚠️ ' + OUTPUT_SECTION_PREFIX_MAP.perfusionHydration + ':') !== -1 || lines[pi].indexOf('** ' + OUTPUT_SECTION_PREFIX_MAP.perfusionHydration + ':') !== -1) {
                    perfIdx = pi;
                    break;
                  }
                }
                if (perfIdx === -1 && !includeSystemPrefixes && lines.length > 0) perfIdx = lines.length - 1;
                if (perfIdx !== -1) {
                  var perfLine = lines[perfIdx];
                  var perfSeverity = perfLine.indexOf('⚠️ ') === 0 ? 'urgent' : (perfLine.indexOf('** ') === 0 ? 'abnormal' : 'normal');
                  var merged = mergeSeverity(perfSeverity, lineSeverity);
                  var perfPrefix = OUTPUT_SECTION_PREFIX_MAP.perfusionHydration;
                  var perfBody = trimSentence(perfLine.replace(new RegExp('^(?:⚠️\\s+|\\*\\*\\s+)?(?:' + perfPrefix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ':\\s*)?', 'i'), ''));
                  lines[perfIdx] = withSectionPrefix('perfusionHydration', perfBody + '.', merged);
                }
              }
              lines.push(line);
            } else lines.push(line);
          }
        }
      }
      if (showAbnormalSummary) {
        var summaryLines = buildAbnormalSummaryLines(abnormalCollector);
        if (summaryLines.length) {
          if (lines.length) lines.push('');
          for (var sl = 0; sl < summaryLines.length; sl++) lines.push(summaryLines[sl]);
        }
      }
      if (typeof updateMskQuickChipStates === 'function') updateMskQuickChipStates();

      var outputEl = document.getElementById('output');
      var titleEl = document.getElementById('outputToggleTitle');
      var systemLineCount = 0;
      for (var lc = 0; lc < lines.length; lc++) {
        var lineText = lines[lc];
        if (!lineText || lineText.indexOf('--- ') === 0) continue;
        if (lineText.indexOf('⚠️ ') === 0 || lineText.indexOf('** ') === 0) {
          // summary lines look the same as severity-marked system lines; we stop counting
          // once we hit the summary divider (handled via the blank line above).
        }
        systemLineCount++;
      }
      if (lines.length) {
        var joinedOutput = lines.join('\n');
        if (expandAbbreviations) joinedOutput = applyAbbreviationExpansions(joinedOutput);
        if (prependTimestamp) {
          joinedOutput = 'Examined ' + formatExamTimestamp() + '.\n' + joinedOutput;
        }
        outputEl.textContent = joinedOutput;
        outputEl.classList.remove('empty');
        var wordCount = (joinedOutput.match(/\b[\w'-]+\b/g) || []).length;
        titleEl.textContent = 'Examination Note (' + wordCount + ' word' + (wordCount === 1 ? '' : 's') + ')';
      } else {
        outputEl.textContent = 'Select findings above to generate the note.';
        outputEl.classList.add('empty');
        titleEl.textContent = 'Examination Note';
      }
    }

    function copyOutput() {
      var out = document.getElementById('output').textContent;
      if (!out || document.getElementById('output').classList.contains('empty')) return;
      var btn = document.getElementById('copyBtn');

      function copiedState() {
        btn.textContent = 'Copied \u2713';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      }

      function failedState() {
        var original = btn.textContent;
        btn.textContent = 'Copy failed';
        setTimeout(function() { btn.textContent = original; }, 1800);
      }

      function legacyCopy() {
        var ta = document.createElement('textarea');
        ta.value = out;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        var ok = false;
        try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
        document.body.removeChild(ta);
        if (ok) copiedState(); else failedState();
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(out).then(copiedState, legacyCopy);
      } else {
        legacyCopy();
      }
    }

      var inputs = document.querySelectorAll('.output-options-grid .output-option-switch');
      var activeCount = 0;
      for (var i = 0; i < inputs.length; i++) {
        var wrap = inputs[i].closest('.output-option');
        if (wrap) wrap.classList.toggle('is-on', inputs[i].checked);
        if (inputs[i].checked) activeCount++;
      }
      var countEl = document.getElementById('outputOptionsCount');
      if (countEl) countEl.textContent = activeCount ? (activeCount + ' on') : '';
    }

    function bindOutputOption(id, setter) {
      var el = document.getElementById(id);
      if (!el) return;
      setter(!!el.checked);
      el.addEventListener('change', function() {
        setter(!!this.checked);
        refreshOptionToggleStyles();
        updateOutput();
      });
    }

    bindOutputOption('prefixToggle', function(v) { includeSystemPrefixes = v; });
    bindOutputOption('severityToggle', function(v) { showSeverityMarkers = v; });
    bindOutputOption('summaryToggle', function(v) { showAbnormalSummary = v; });
    bindOutputOption('abnormalsOnlyToggle', function(v) { abnormalsOnly = v; });
    bindOutputOption('expandAbbrevToggle', function(v) { expandAbbreviations = v; });
    bindOutputOption('timestampToggle', function(v) { prependTimestamp = v; });
    refreshOptionToggleStyles();
    updateOutput();
  </script>
</body>
</html>
