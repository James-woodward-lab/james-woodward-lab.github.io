<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="color-scheme" content="dark light">
  <title>Examination Notes</title>
  <link rel="stylesheet" href="../css/app-theme.css">
  <script src="../js/theme-toggle.js"></script>
  <style>
    /* ===== GLOBAL SPACING TOKENS ===== */
    :root {
      --sp-within: 6px;   /* gap between sibling elements inside a group */
      --sp-group: 8px;    /* gap between groups within a section */
      --sp-section: 12px; /* gap between section cards */
    }

    .exam-container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 calc(16px + var(--safe-r)) 110px calc(16px + var(--safe-l));
    }
    .exam-container > header.app-header-center h1 {
      font-size: 2.275rem;
    }
    @media (max-width: 600px) {
      .exam-container > header.app-header-center h1 { font-size: 1.95rem; }
    }
    @media (min-width: 900px) {
      .exam-container { max-width: 1024px; }
    }

    /* ===== SECTION GROUPS GRID ===== */
    .section-groups-grid {
      display: grid;
      gap: var(--sp-group) 12px;
      grid-template-columns: 1fr;
      align-items: start;
    }
    /* Up to 2 columns when the card is wide enough; neurology stays single-column */
    @container section-card (min-width: 34rem) {
      .section-groups-grid:not(.section-groups-grid--single) {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .section-groups-grid .span-full { grid-column: 1 / -1; }
    }
    /* Viewport fallback where container queries are not applied */
    @media (min-width: 640px) {
      .section-groups-grid:not(.section-groups-grid--single) {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .section-groups-grid .span-full { grid-column: 1 / -1; }
    }
    .section-groups-grid--single { grid-template-columns: 1fr !important; }

    /* Cardiovascular: NAD full-width row 1; heart sounds + radial on row 2 when 2-column */
    @container section-card (min-width: 34rem) {
      .section-groups-grid--cardiovascular .cvs-nad-slot {
        grid-column: 1 / -1;
        grid-row: 1;
        align-self: start;
      }
      .section-groups-grid--cardiovascular .cvs-heart-slot {
        grid-column: 1;
        grid-row: 2;
        align-self: start;
      }
      .section-groups-grid--cardiovascular .cvs-radial-slot {
        grid-column: 2;
        grid-row: 2;
        align-self: start;
      }
      .section-groups-grid--cardiovascular .cvs-murmur-slot {
        grid-column: 1 / -1;
        grid-row: 3;
      }
      .section-groups-grid--cardiovascular .cvs-femoral-slot {
        grid-column: 1 / -1;
        grid-row: 4;
      }
      .section-groups-grid--cardiovascular .cvs-hep-slot {
        grid-column: 1 / -1;
        grid-row: 5;
      }
    }
    @media (min-width: 640px) {
      .section-groups-grid--cardiovascular .cvs-nad-slot {
        grid-column: 1 / -1;
        grid-row: 1;
        align-self: start;
      }
      .section-groups-grid--cardiovascular .cvs-heart-slot {
        grid-column: 1;
        grid-row: 2;
        align-self: start;
      }
      .section-groups-grid--cardiovascular .cvs-radial-slot {
        grid-column: 2;
        grid-row: 2;
        align-self: start;
      }
      .section-groups-grid--cardiovascular .cvs-murmur-slot {
        grid-column: 1 / -1;
        grid-row: 3;
      }
      .section-groups-grid--cardiovascular .cvs-femoral-slot {
        grid-column: 1 / -1;
        grid-row: 4;
      }
      .section-groups-grid--cardiovascular .cvs-hep-slot {
        grid-column: 1 / -1;
        grid-row: 5;
      }
    }

    /* ===== SECTION CARD ===== */
    .section-card {
      container-type: inline-size;
      container-name: section-card;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: var(--sp-section);
    }
    .section-card .sec-heading {
      font-size: 1.138rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-card .sec-heading .sec-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      height: auto;
      background: transparent;
      color: inherit;
      border-radius: 0;
      font-size: 1.05em;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ===== GROUP ROW / LABEL ===== */
    .group-row { margin-bottom: var(--sp-group); }
    .group-row:last-of-type { margin-bottom: 4px; }
    .group-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== PILL BUTTONS (radio) ===== */
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-within);
    }
    .pill-opt {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      min-height: 36px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
      white-space: nowrap;
      box-sizing: border-box;
    }
    @media (max-width: 600px) {
      .pill-opt { min-height: 44px; padding: 8px 12px; }
    }
    .pill-opt:hover { border-color: var(--accent); color: var(--text); }
    .pill-opt input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .pill-opt.selected { border-color: var(--accent); background: color-mix(in srgb,var(--accent) 12%,transparent); color: var(--accent); font-weight: 600; }
    .pill-opt.selected.abnormal { border-color: var(--danger); background: var(--danger-surface); color: var(--danger); }
    .pill-opt.selected.pill-normal { border-color: var(--success); background: color-mix(in srgb,var(--success) 12%,transparent); color: var(--success); }
    button.pill-opt {
      font: inherit;
      line-height: inherit;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    /* ===== CHECK BUTTONS (checkbox) ===== */
    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--sp-within);
    }
    @media (max-width: 520px) {
      .check-grid {
        grid-template-columns: 1fr;
      }
    }
    .check-opt {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      min-height: 36px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
      box-sizing: border-box;
    }
    @media (max-width: 600px) {
      .check-opt { min-height: 44px; padding: 8px 12px; }
    }
    .check-opt:hover { border-color: var(--accent); color: var(--text); }
    .check-opt input {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px;
      border: 2px solid var(--border); border-radius: 4px;
      background: var(--surface); cursor: pointer; flex-shrink: 0;
      position: relative; transition: border-color 0.15s, background 0.15s;
    }
    .check-opt input:checked { border-color: var(--accent); background: var(--accent); }
    .check-opt input:checked::after {
      content: ""; position: absolute; left: 3px; top: 1px;
      width: 5px; height: 8px;
      border: solid var(--accent-on); border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .check-opt.selected { border-color: var(--accent); color: var(--text); background: color-mix(in srgb,var(--accent) 6%,transparent); }
    .check-opt.selected.abnormal { border-color: var(--danger); color: var(--danger); background: color-mix(in srgb,var(--danger) 6%,transparent); }
    .check-opt.selected.pill-normal { border-color: var(--success); color: var(--success); background: color-mix(in srgb,var(--success) 6%,transparent); }

    /* ===== ABDOMEN PERITONITIC YES/NO (uses .check-grid for tile width; .check-opt-like rows) ===== */
    .yesno-toggle-wrap {
      width: 100%;
    }
    .yesno-toggle-row {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      min-width: 0;
      padding: 6px 10px;
      min-height: 36px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      box-sizing: border-box;
    }
    .yesno-toggle-label {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 0.875rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .yesno-toggle-actions {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      gap: 6px;
    }
    .yesno-toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      min-height: 36px;
      padding: 6px 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      box-sizing: border-box;
    }
    @media (max-width: 600px) {
      .yesno-toggle-row {
        min-height: 44px;
        padding: 8px 12px;
      }
      .yesno-toggle-btn {
        min-height: 44px;
        min-width: 44px;
        padding: 8px 12px;
      }
    }
    .yesno-toggle-btn input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .yesno-toggle-btn:hover { border-color: var(--accent); color: var(--text); }
    .yesno-toggle-btn.selected { font-weight: 500; }
    .yesno-toggle-btn.selected.pill-normal {
      border-color: var(--success);
      color: var(--success);
      background: color-mix(in srgb, var(--success) 6%, transparent);
    }
    .yesno-toggle-btn.selected.abnormal {
      border-color: var(--danger);
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 6%, transparent);
    }

    /* ===== FREE TEXT ===== */
    .free-text-field { margin-top: var(--sp-group); }
    .free-text-field textarea {
      width: 100%; background: var(--surface2);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 8px 10px; color: var(--text);
      font-size: 0.875rem; font-family: inherit;
      resize: vertical; min-height: 34px;
      transition: border-color 0.15s; box-sizing: border-box;
    }
    .free-text-field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
    .free-text-field textarea::placeholder { color: var(--muted); font-size: 0.8rem; }
    .conditional-inline-field { display: none; margin-top: 4px; }
    .conditional-inline-field.show { display: block; }
    .auscultation-added-panel {
      border: 1px solid var(--border); border-radius: 8px; background: var(--surface2);
      padding: 4px 6px 6px;
    }
    .auscultation-other-field { margin-top: 6px; }
    .auscultation-other-field textarea {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 6px 8px; color: var(--text); font-size: 0.875rem; font-family: inherit;
      resize: vertical; min-height: 32px; box-sizing: border-box;
    }
    .auscultation-other-field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }

    /* ===== EXTRA (COLLAPSIBLE) SECTIONS ===== */
    .extra-sections { margin-top: var(--sp-section); }
    .extra-sections details { margin-bottom: 6px; }
    .extra-sections summary {
      cursor: pointer; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      font-weight: 600; font-size: 1.138rem; color: var(--text);
      list-style: none; display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
      transition: border-color 0.15s, background 0.15s; user-select: none;
    }
    .extra-sections summary::-webkit-details-marker { display: none; }
    .extra-sections summary::after { content: "\25B6"; font-size: 0.78rem; color: var(--muted); transition: transform 0.2s; }
    .extra-sections details[open] > summary::after { transform: rotate(90deg); }
    .extra-sections summary:hover { border-color: var(--accent); }
    .extra-sections details[open] > summary { border-radius: var(--radius) var(--radius) 0 0; border-bottom-color: transparent; }
    .extra-sections details > .section-card { border-top: none; border-radius: 0 0 var(--radius) var(--radius); margin-bottom: 0; }

    /* ===== OUTPUT PANEL ===== */
    .output-panel {
      position: sticky; bottom: 0; z-index: 50;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 10px 0 calc(10px + var(--safe-b));
      margin: 0 calc(-16px - var(--safe-r)) 0 calc(-16px - var(--safe-l));
      padding-left: calc(16px + var(--safe-l));
      padding-right: calc(16px + var(--safe-r));
    }
    .output-inner { max-width: 780px; margin: 0 auto; }
    @media (min-width: 900px) { .output-inner { max-width: 1024px; } }
    .output-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .output-toggle-title { font-size: 1.138rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
    .output-actions { display: flex; gap: 6px; align-items: center; }
    .output-actions button {
      padding: 6px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s, background 0.15s; min-height: 30px;
    }
    .output-actions button:hover { border-color: var(--accent); }
    .output-actions .copy-btn { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
    .output-actions .copy-btn:hover { background: var(--accent2); }
    .output-actions .copy-btn.copied { background: var(--success); border-color: var(--success); }
    .output-body {
      margin-top: 8px; font-size: 0.875rem; line-height: 1.55;
      color: var(--text); white-space: pre-wrap;
      min-height: 60px; max-height: 40vh; overflow-y: auto;
      padding: 10px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .output-body.empty { color: var(--muted); font-style: italic; text-align: center; padding: 14px; min-height: 60px; }
    .output-collapsed .output-body { display: none; }
    .output-options-wrap {
      margin-top: 8px;
    }
    .output-options-details {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }
    .output-options-details > summary {
      cursor: pointer;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      user-select: none;
    }
    .output-options-details > summary::-webkit-details-marker { display: none; }
    .output-options-details > summary::after {
      content: "\25B6"; font-size: 0.65rem; color: var(--muted); transition: transform 0.2s;
    }
    .output-options-details[open] > summary::after { transform: rotate(90deg); }
    .output-options-details > summary .output-options-count { color: var(--accent); font-weight: 700; text-transform: none; letter-spacing: 0; }
    .output-options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 6px 8px 8px;
      border-top: 1px solid var(--border);
    }
    @media (min-width: 520px) {
      .output-options-grid { grid-template-columns: 1fr 1fr; }
    }
    .output-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      min-height: 36px;
      box-sizing: border-box;
    }
    .output-option:hover { border-color: var(--accent); }
    .output-option-label { line-height: 1.25; }
    .output-option-switch {
      appearance: none; -webkit-appearance: none;
      width: 34px; height: 18px;
      flex: 0 0 auto;
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .output-option-switch::after {
      content: "";
      position: absolute;
      top: 1px;
      left: 1px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.15s, background 0.15s;
    }
    .output-option-switch:checked {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      border-color: var(--accent);
    }
    .output-option-switch:checked::after {
      transform: translateX(16px);
      background: var(--accent);
    }
    .output-option.is-on { border-color: var(--accent); }

    /* ===== LUNG MAP ===== */
    .lung-map-wrap { margin-top: var(--sp-group); }
    .lung-map-details {
      border: 1px solid var(--border); border-radius: 10px; background: var(--surface2); overflow: hidden;
    }
    .lung-map-details > summary {
      cursor: pointer; padding: 8px 10px; font-size: 0.875rem; font-weight: 600; color: var(--text);
      list-style: none; display: flex; align-items: center; justify-content: space-between; gap: 6px;
      user-select: none; background: var(--surface2); transition: background 0.15s;
    }
    .lung-map-details > summary::-webkit-details-marker { display: none; }
    .lung-map-details > summary::after {
      content: "\25B6"; font-size: 0.65rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0;
    }
    .lung-map-details[open] > summary::after { transform: rotate(90deg); }
    .lung-map-details > summary:hover { background: var(--surface); }
    .lung-map-details-body { padding: 6px; border-top: 1px solid var(--border); background: var(--surface2); }
    .lung-map-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 6px; }
    @media (max-width: 720px) { .lung-map-layout { grid-template-columns: 1fr; } }
    .lung-svg-shell {
      border: 1px solid var(--border); border-radius: 8px; background: var(--surface);
      padding: 4px; width: 100%; max-width: 22.5rem; margin: 0 auto; box-sizing: border-box;
    }
    .lung-svg-shell svg { display: block; width: 100%; height: auto; }
    .lung-zone { cursor: pointer; transition: fill 0.15s, stroke 0.15s; fill: color-mix(in srgb, var(--accent) 12%, transparent); stroke: var(--border); stroke-width: 1.5; }
    .lung-zone:hover { stroke: var(--accent); fill: color-mix(in srgb, var(--accent) 20%, transparent); }
    .lung-zone.active { stroke: var(--accent); fill: color-mix(in srgb, var(--accent) 30%, transparent); }
    .lung-zone.has-findings { stroke: var(--success); fill: color-mix(in srgb, var(--success) 20%, transparent); }
    .lung-zone-label { font-size: 0.875rem; fill: var(--muted); pointer-events: none; font-weight: 500; }
    .lung-picker { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); padding: 6px; }
    .lung-picker-title { font-size: 0.875rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .lung-finding-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .lung-finding-chip {
      display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); border-radius: 999px;
      padding: 4px 8px; min-height: 36px;
      font-size: 0.875rem; font-weight: 500; box-sizing: border-box; cursor: pointer; user-select: none;
    }
    @media (max-width: 600px) { .lung-finding-chip { min-height: 44px; padding: 6px 10px; } }
    .lung-finding-chip input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .lung-finding-chip.selected { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); font-weight: 600; }
    .lung-summary { margin-top: 4px; font-size: 0.875rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 4px; font-weight: 500; }
    .lung-summary-badge { border: 1px solid var(--border); background: var(--surface); border-radius: 999px; padding: 2px 6px; }
    .lung-zone-note { margin-top: 4px; }
    .lung-zone-note textarea {
      width: 100%; background: var(--surface2);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 4px 6px; color: var(--text);
      font-size: 0.875rem; font-family: inherit;
      resize: vertical; min-height: 28px; box-sizing: border-box;
    }
    .lung-zone-note textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }

    /* ===== HEENT ===== */
    .heent-subblock { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .heent-subblock:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .heent-subtitle { font-size: 0.975rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .heent-tm-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
    .heent-tm-cols.conditional-inline-field { display: none; }
    .heent-tm-cols.conditional-inline-field.show { display: grid; }

    .heent-tonsil-cols.conditional-inline-field.show { display: grid; }

    @media (max-width: 520px) { .heent-tonsil-cols { grid-template-columns: 1fr; } }

    .heent-tm-dull-note-cell {
      display: flex;
      align-items: center;
      min-height: 36px;
      padding: 6px 10px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      box-sizing: border-box;
    }
    .heent-tm-dull-note {
      width: 100%;
      min-height: 22px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
    }

      .heent-tm-dull-note-cell { min-height: 44px; padding: 8px 12px; }

    #heentNeckMeningismYnWrap { margin-top: 10px; }
    .check-grid.heent-meningism-grid { gap: var(--sp-within); }

    /* ===== MSK SECTION ===== */
    #mskBlock .msk-group-details {
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 6px; background: var(--surface);
    }
    #mskBlock .msk-group-details > summary {
      cursor: pointer; padding: 8px 12px;
      font-size: 0.95rem; font-weight: 700; color: var(--text);
      list-style: none; display: flex; align-items: center; justify-content: space-between; gap: 6px;
      user-select: none; transition: background 0.15s;
    }
    #mskBlock .msk-group-details > summary::-webkit-details-marker { display: none; }
    #mskBlock .msk-group-details > summary::after {
      content: "\25B6"; font-size: 0.65rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0;
    }
    #mskBlock .msk-group-details[open] > summary::after { transform: rotate(90deg); }
    #mskBlock .msk-group-details > summary:hover { background: var(--surface2); }
    #mskBlock .msk-group-body { padding: 6px 8px 8px; border-top: 1px solid var(--border); }
    #mskBlock .msk-subsection-details {
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 5px; background: var(--surface2);
    }
    #mskBlock .msk-subsection-details > summary {
      cursor: pointer; padding: 6px 10px;
      font-size: 0.88rem; font-weight: 600; color: var(--text);
      list-style: none; display: flex; align-items: center; justify-content: space-between; gap: 6px;
      user-select: none; transition: background 0.15s;
    }
    #mskBlock .msk-subsection-details > summary::-webkit-details-marker { display: none; }
    #mskBlock .msk-subsection-details > summary::after {
      content: "\25B6"; font-size: 0.6rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0;
    }
    #mskBlock .msk-subsection-details[open] > summary::after { transform: rotate(90deg); }
    #mskBlock .msk-subsection-details > summary:hover { background: var(--surface); }
    #mskBlock .msk-subsection-body { padding: 8px 10px 10px; border-top: 1px solid var(--border); }
    .msk-bilateral-cols {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px;
    }
    @media (max-width: 520px) { .msk-bilateral-cols { grid-template-columns: 1fr; } }
    .msk-side-col-label {
      font-size: 0.7rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .msk-nad-row { margin-bottom: 6px; }
    .msk-findings-wrap { display: block; }

    #mskBlock .msk-shoulder-bilateral-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
      align-items: start;
    }

    .msk-shoulder-section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 10px 0 6px;
    }

    .msk-shoulder-palp-wrap .conditional-inline-field { display: none; margin-top: 6px; margin-bottom: 6px; }
    .msk-shoulder-ins-wrap .conditional-inline-field.show,
    .msk-shoulder-palp-wrap .conditional-inline-field.show { display: block; }
    .msk-shoulder-wounds-ta { width: 100%; min-height: 44px; }

    /* ===== MSK QUICK PICKER / QUICK SCREEN ===== */
    .msk-quick-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
      padding-bottom: 10px;
    }
    .msk-quick-search-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .msk-quick-search {
      flex: 1 1 180px;
      min-height: 36px;
      padding: 6px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
    }
    .msk-quick-search:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .msk-quick-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .msk-quick-btn {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      min-height: 32px;
      font-family: inherit;
    }
    .msk-quick-btn:hover { border-color: var(--accent); }
    .msk-quick-btn.primary {
      background: var(--accent);
      color: var(--accent-on);
      border-color: var(--accent);
    }
    .msk-quick-btn.primary:hover { background: var(--accent2); }
    .msk-quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 140px;
      overflow-y: auto;
    }
    .msk-quick-chip {
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      min-height: 28px;
      line-height: 1.2;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .msk-quick-chip:hover { border-color: var(--accent); }
    .msk-quick-chip[hidden] { display: none; }
    .msk-quick-chip.is-nad {
      border-color: var(--success);
      background: color-mix(in srgb, var(--success) 12%, transparent);
      color: var(--success);
    }
    .msk-quick-chip.has-findings {
      border-color: var(--danger);
      background: var(--danger-surface);
      color: var(--danger);
      font-weight: 600;
    }
    .msk-quick-empty {
      font-size: 0.78rem;
      color: var(--muted);
      padding: 4px 2px;
    }

    .msk-quick-screen {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin-bottom: 10px;
    }
    .msk-quick-screen-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .msk-quick-screen .check-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    @media (max-width: 520px) {
      .msk-quick-screen .check-grid { grid-template-columns: 1fr; }
    }

    @keyframes mskFlashHighlight {
      0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent); }
      30%  { box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 55%, transparent); }
      100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent); }
    }
    .msk-subsection-details.flash-highlight { animation: mskFlashHighlight 1s ease-out; border-radius: 6px; }

    .section-hint { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">&#9728;&#65039;</button>
  <div class="exam-container">
    <header class="app-header-center">
      <h1>Examination Notes</h1>
      <p>Tool to aid documentation of examination findings</p>
    </header>

    <div id="exam-sections"></div>
  </div>

  <div class="output-panel" id="outputPanel">
    <div class="output-inner">
      <div class="output-toggle" onclick="toggleOutputPanel()">
        <span class="output-toggle-title" id="outputToggleTitle">Examination Note</span>
        <div class="output-actions">
          <button type="button" class="copy-btn" id="copyBtn" onclick="event.stopPropagation(); copyOutput()">Copy</button>
          <button type="button" onclick="event.stopPropagation(); clearAll()">Clear all</button>
        </div>
      </div>
      <div class="output-body empty" id="output">Select findings above to generate the note.</div>
      <div class="output-options-wrap">
        <details class="output-options-details" id="outputOptionsDetails">
          <summary>
            <span>Output options</span>
            <span class="output-options-count" id="outputOptionsCount"></span>
          </summary>
          <div class="output-options-grid">
            <label class="output-option" data-option-id="prefixToggle">
              <span class="output-option-label">Include system prefixes (e.g. CVS, RESP)</span>
              <input type="checkbox" class="output-option-switch" id="prefixToggle">
            </label>
            <label class="output-option is-on" data-option-id="severityToggle">
              <span class="output-option-label">Show severity markers (&#9888;&#65039; / **)</span>
              <input type="checkbox" class="output-option-switch" id="severityToggle" checked>
            </label>
            <label class="output-option is-on" data-option-id="summaryToggle">
              <span class="output-option-label">Append notable findings summary</span>
              <input type="checkbox" class="output-option-switch" id="summaryToggle" checked>
            </label>
            <label class="output-option" data-option-id="abnormalsOnlyToggle">
              <span class="output-option-label">Abnormal findings only</span>
              <input type="checkbox" class="output-option-switch" id="abnormalsOnlyToggle">
            </label>
            <label class="output-option" data-option-id="expandAbbrevToggle">
              <span class="output-option-label">Expand abbreviations (NAD, TM, CRT&hellip;)</span>
              <input type="checkbox" class="output-option-switch" id="expandAbbrevToggle">
            </label>
            <label class="output-option" data-option-id="timestampToggle">
              <span class="output-option-label">Prepend date &amp; time stamp</span>
              <input type="checkbox" class="output-option-switch" id="timestampToggle">
            </label>
          </div>
        </details>
      </div>
    </div>
  </div>

        var findings = lungZoneState[zone.key] || [];
        for (var f = 0; f < findings.length; f++) {
          var finding = findings[f];
          if (finding === 'Vesicular breath sounds') parts.push('vesicular breath sounds at the ' + getLungZoneLabel(zone.key));
          else if (finding === 'Reduced air entry') parts.push('reduced air entry at the ' + getLungZoneLabel(zone.key));
          else if (finding === 'Wheeze') parts.push('polyphonic expiratory wheeze in the ' + getLungZoneLabel(zone.key));
          else if (finding === 'Fine crackles') parts.push('fine crackles at the ' + getLungZoneLabel(zone.key));
          else if (finding === 'Coarse crackles') parts.push('coarse crackles at the ' + getLungZoneLabel(zone.key));
        }
        var note = trimSentence(lungZoneNotes[zone.key] || '');
        if (note) parts.push(note.toLowerCase() + ' at the ' + getLungZoneLabel(zone.key));
      }
      if (!parts.length) return '';
      return formatOrderedCommaLine(parts, abnormalCollector, 'respiratory');
    }

    function handlePillClick(label, ev) {
      if (ev && typeof ev.preventDefault === 'function') ev.preventDefault();
      var input = label.querySelector('input');
      if (!input) return;
      var row = label.parentElement;
      var siblings = row ? row.querySelectorAll('.pill-opt') : [];
      if (input.checked) {
        input.checked = false;
        for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('selected', 'abnormal', 'pill-normal');
        if (input.name === 'abdomen__tenderness') updateAbdomenTendernessField();
        if (input.name === 'skin__rash' || input.name === 'skin__bruising') updateSkinRashBruisingFields();
        if (input.name === 'heent__oral_cavity_vis' || input.name === 'heent__tonsils_vis') updateHeentOralCavityPanel();
        if (input.name === 'general__state' || input.name === 'general__appearance' || input.name === 'general__comfort' || input.name === 'general__interaction') syncGeneralNadPill();
        if (input.name === 'perfusionHydration__crtCentral' || input.name === 'perfusionHydration__crtPeripheral' || input.name === 'perfusionHydration__perfusion' || input.name === 'perfusionHydration__mucosa') syncPerfusionNadPill();
        if (input.name === 'cardiovascular__heartMurmur' || input.name === 'cardiovascular__radialPulse') syncCardiovascularNadPill();
        if (input.name === 'respiratory__wob' || input.name === 'respiratory__upperAirwayMode' || input.name === 'respiratory__chestAppearance' || input.name === 'respiratory__auscultationMode') syncRespiratoryNadPill();
        if (input.name === 'abdomen__consistency' || input.name === 'abdomen__distension' || input.name === 'abdomen__tenderness' || input.name === 'abdomen__guarding' || input.name === 'abdomen__bowelSounds') syncAbdomenNadPill();
        if (input.name === 'heent__tm_nad' || input.name === 'heent__photo' || input.name === 'heent__pearl' || input.name === 'heent__conj' || input.name === 'heent__lips' || input.name === 'heent__oral_cavity_vis' || input.name === 'heent__tonsils_vis' || input.name === 'heent__neck_ln') syncHeentNadPill();
        if (input.name === 'skin__colour' || input.name === 'skin__rash' || input.name === 'skin__bruising' || input.name === 'skin__nappy' || input.name === 'skin__perfusion') syncSkinNadPill();
        updateOutput();
        return;
      }
      for (var i = 0; i < siblings.length; i++) {
        siblings[i].classList.remove('selected', 'abnormal', 'pill-normal');
        var inp = siblings[i].querySelector('input');
        if (inp) inp.checked = false;
      }
      input.checked = true;
      label.classList.add('selected');
      var v = input.value;
      var n = input.name;
      if (n === 'cardiovascular__radialPulse' && v !== 'Radial pulses normal') label.classList.add('abnormal');
      else if (n === 'abdomen__bowelSounds' && v === 'Bowel sounds present') label.classList.add('pill-normal');
      else if (n === 'abdomen__bowelSounds' && (v === 'Bowel sounds reduced' || v === 'Bowel sounds absent')) label.classList.add('abnormal');
      else if (n === 'respiratory__chestAppearance' && v === 'Good chest rise') label.classList.add('pill-normal');
      else if (n === 'respiratory__chestAppearance' && v === 'Poor chest rise') label.classList.add('abnormal');
      else if (n === 'respiratory__chestAppearance' && v === 'Asymmetrical chest rise') label.classList.add('abnormal');
      else if (n === 'respiratory__auscultationMode' && v === 'Chest clear') label.classList.add('pill-normal');
      else if (n === 'respiratory__auscultationMode' && v === 'Added sounds') label.classList.add('abnormal');
      else if (n === 'heent__photo' && v === 'No photophobia') label.classList.add('pill-normal');
      else if (n === 'heent__photo' && v === 'Photophobia present') label.classList.add('abnormal');
      else if (n === 'heent__pearl') label.classList.add('pill-normal');
      else if (n === 'heent__conj' && v === 'Normal conjunctiva') label.classList.add('pill-normal');
      else if (n === 'heent__conj' && (v === 'Conjunctival injection' || v === 'Conjunctival discharge')) label.classList.add('abnormal');
      else if (n === 'respiratory__wob' && (v === 'Mild' || v === 'Moderate' || v === 'Severe')) label.classList.add('abnormal');
      else if (n === 'respiratory__wob' && v === 'No WOB') label.classList.add('pill-normal');
      else if (n === 'skin__colour' && v === 'No pallor') label.classList.add('pill-normal');
      else if (n === 'skin__colour') label.classList.add('abnormal');
      else {
        var ph = pillHighlightClassFromTaggedInput(input);
        if (ph === 'abnormal') label.classList.add('abnormal');
        else if (ph === 'pill-normal') label.classList.add('pill-normal');
        else if (classifyFinding(v) === 'abnormal') label.classList.add('abnormal');
        else if (classifyFinding(v) === 'normal') label.classList.add('pill-normal');
      }
      if (n === 'abdomen__tenderness') updateAbdomenTendernessField();
      if (n === 'respiratory__wob') updateRespiratoryWobDependentPanels();
      if (n === 'respiratory__upperAirwayMode') updateUpperAirwayFindingsPanel();
      if (n === 'respiratory__auscultationMode') {
        updateAuscultationAddedPanel();
        if (v === 'Chest clear') clearAuscultationAddedFields();
      }
      if (n === 'cardiovascular__heartMurmur') {
        updateCvMurmurDetailsPanel();
        if (v !== 'Murmur') clearCvMurmurDetailFields();
      }
      if (n === 'heent__tm_nad') {
        updateHeentTmFindingsPanel();
        if (v !== 'Tympanic membrane findings') clearHeentTmFindings();
      }
      if (n === 'heent__oral_cavity_vis' || n === 'heent__tonsils_vis') updateHeentOralCavityPanel();
      if (n === 'skin__rash' || n === 'skin__bruising') updateSkinRashBruisingFields();
      if (n === 'general__state' || n === 'general__appearance' || n === 'general__comfort' || n === 'general__interaction') syncGeneralNadPill();
      if (n === 'perfusionHydration__crtCentral' || n === 'perfusionHydration__crtPeripheral' || n === 'perfusionHydration__perfusion' || n === 'perfusionHydration__mucosa') syncPerfusionNadPill();
      if (n === 'cardiovascular__heartMurmur' || n === 'cardiovascular__radialPulse') syncCardiovascularNadPill();
      if (n === 'respiratory__wob' || n === 'respiratory__upperAirwayMode' || n === 'respiratory__chestAppearance' || n === 'respiratory__auscultationMode') syncRespiratoryNadPill();
      if (n === 'abdomen__consistency' || n === 'abdomen__distension' || n === 'abdomen__tenderness' || n === 'abdomen__guarding' || n === 'abdomen__bowelSounds') syncAbdomenNadPill();
      if (n === 'heent__tm_nad' || n === 'heent__photo' || n === 'heent__pearl' || n === 'heent__conj' || n === 'heent__lips' || n === 'heent__oral_cavity_vis' || n === 'heent__tonsils_vis' || n === 'heent__neck_ln') syncHeentNadPill();
      if (n === 'skin__colour' || n === 'skin__rash' || n === 'skin__bruising' || n === 'skin__nappy' || n === 'skin__perfusion') syncSkinNadPill();
      updateOutput();
    }

    function getRespiratoryAuscultationLine(abnormalCollector) {
      var mode = document.querySelector('input[name="respiratory__auscultationMode"]:checked');
      if (!mode) return '';
      if (mode.value === 'Chest clear') {
        if (abnormalsOnly) return '';
        return 'On auscultation, chest clear, with vesicular breath sounds throughout, good air entry globally and no added sounds.';
      }
      if (mode.value === 'Added sounds') {
        var findings = [];
        var ausAddedWrap = document.getElementById('respiratoryAuscultationAddedWrap');
        var grid = ausAddedWrap ? ausAddedWrap.querySelector('.auscultation-added-check-grid') : null;
        if (grid) {
          var checked = grid.querySelectorAll('input[type="checkbox"]:checked');
          for (var ci = 0; ci < checked.length; ci++) {
            var findingValue = trimSentence(checked[ci].value);
            if (findingValue === 'Wheeze') findings.push('polyphonic expiratory wheeze');
            else if (findingValue === 'Fine crackles') findings.push('fine crackles');
            else if (findingValue === 'Coarse crackles') findings.push('coarse crackles');
            else findings.push(findingValue.toLowerCase());
          }
        }
        var other = trimSentence(document.getElementById('respiratory__auscultation_other') ? document.getElementById('respiratory__auscultation_other').value : '');
        if (other) findings.push(other.toLowerCase());
        if (!findings.length) return '';
        var formatted = formatFindingsLine(findings, abnormalCollector, 'respiratory');
        if (!formatted) return '';
        var hasFocalFindings = false;
        for (var zi = 0; zi < LUNG_ZONES.length; zi++) {
          var zoneKey = LUNG_ZONES[zi].key;
          if ((lungZoneState[zoneKey] || []).length > 0 || trimSentence(lungZoneNotes[zoneKey] || '')) {
            hasFocalFindings = true;
            break;
          }
        }
        var formattedBody = trimSentence(formatted);
        if (!hasFocalFindings) return 'On auscultation, bilateral ' + formattedBody + ', with no focal findings identified.';
        return 'On auscultation, bilateral ' + formattedBody + '.';
      }
      return '';
    }

    function syncRecessionPresentFromSubtypes() {

      if (!wrap) return;

      if (!any) return;
      var recessYes = document.getElementById('respiratory__accessory__recessions__yes');

    function clearMskSubsectionFindings(subKey) {
      if (subKey === 'shoulder') {
        clearMskShoulderFields();

      var mskBlock = document.getElementById('mskBlock');
      if (!mskBlock || !subKey) return;
      var sel = 'input[name^="msk__' + subKey + '__R__"], input[name^="msk__' + subKey + '__L__"], input[name^="msk__' + subKey + '__M__"]';
      var nodes = mskBlock.querySelectorAll(sel);
      for (var i = 0; i < nodes.length; i++) {
        nodes[i].checked = false;
        var lab = nodes[i].closest('.check-opt');
        if (lab) lab.classList.remove('selected', 'abnormal', 'pill-normal');

    function handleCheckClick(label) {
      var input = label.querySelector('input');
      setTimeout(function() {

        if (input.name && input.name.indexOf('msk__') === 0 && input.type === 'checkbox') {
          var mskNameParts = input.name.split('__');
          if (mskNameParts.length === 3 && mskNameParts[2] === 'nad' && input.checked) {
            if (mskNameParts[1] === 'shoulder') clearMskShoulderFields();
            else clearMskSubsectionFindings(mskNameParts[1]);
          } else if (mskNameParts.length >= 4 && mskNameParts[0] === 'msk' && (mskNameParts[2] === 'R' || mskNameParts[2] === 'L' || mskNameParts[2] === 'M')) {
            if (input.checked) {
              var nadEl = document.getElementById('msk__' + mskNameParts[1] + '__nad');
              if (nadEl && nadEl.checked) {
                nadEl.checked = false;
                var nadLab = nadEl.closest('.check-opt');
                if (nadLab) nadLab.classList.remove('selected', 'abnormal', 'pill-normal');
              }
            }
          }
        }

        if (input.name && input.name.indexOf('abdomen__checks__') === 0) syncAbdomenNadPill();

        if (input.checked) {
          label.classList.add('selected');
          if (label.closest('.heent-tm-L-col') || label.closest('.heent-tm-R-col')) {
            label.classList.add('abnormal');
            label.classList.remove('pill-normal');
          } else if (label.closest('.heent-tonsil-L-col') || label.closest('.heent-tonsil-R-col')) {
            label.classList.add('abnormal');
            label.classList.remove('pill-normal');
          } else if (label.closest('#recessionSubtypeWrap')) label.classList.add('abnormal');
          else if (label.closest('.auscultation-added-check-grid')) label.classList.add('abnormal');
          else if (input.name.indexOf('respiratory__upperAirwayFindings__') === 0 && input.value === 'Soft stridor') label.classList.add('abnormal');
          else if (input.name.indexOf('msk__') === 0 && (input.name.indexOf('__nad') !== -1 || input.name.indexOf('msk__quickscreen__') === 0)) label.classList.add('pill-normal');
          else {
            var phc = pillHighlightClassFromTaggedInput(input);
            if (phc === 'abnormal') label.classList.add('abnormal');
            else if (phc === 'pill-normal') label.classList.add('pill-normal');
            else if (classifyFinding(input.value) === 'abnormal') label.classList.add('abnormal');
            else if (classifyFinding(input.value) === 'normal') label.classList.add('pill-normal');
            else label.classList.remove('abnormal', 'pill-normal');
          }
          if (label.closest('#recessionSubtypeWrap')) syncRecessionPresentFromSubtypes();
        } else {
          label.classList.remove('selected', 'abnormal', 'pill-normal');
        }
        updateOutput();
      }, 0);
    }

    function formatHeentMouthLine(parts) {

    function heentTonsilSidePhrase(sideWord, ery, exo, enl) {
      if (ery && enl && exo) return sideWord + ' tonsil erythematous and enlarged, with exudate';
      if (ery && enl) return sideWord + ' tonsil erythematous and enlarged';
      if (ery && exo) return sideWord + ' tonsil erythematous, with exudate';
      if (enl && exo) return sideWord + ' tonsil enlarged, with exudate';
      if (exo) return 'Exudate to ' + sideWord + ' tonsil';
      if (ery) return sideWord + ' tonsil erythematous';
      if (enl) return sideWord + ' tonsil enlarged';
      return '';
    }

    function heentTonsilBilateralPhrase(ery, exo, enl) {
      if (ery && enl && exo) return 'Tonsils erythematous and enlarged, with exudate bilaterally';
      if (ery && enl) return 'Tonsils erythematous and enlarged bilaterally';
      if (ery && exo) return 'Tonsils erythematous, with exudate bilaterally';
      if (enl && exo) return 'Tonsils enlarged, with exudate bilaterally';
      if (exo) return 'Exudate to tonsils bilaterally';
      if (ery) return 'Tonsils erythematous bilaterally';
      if (enl) return 'Tonsils enlarged bilaterally';
      return '';
    }

    function heentReadTonsilSide(root, side) {
      return {
        ery: !!(root.querySelector('input[name="heent__tonsil_' + side + '_ery"]:checked')),
        exo: !!(root.querySelector('input[name="heent__tonsil_' + side + '_exo"]:checked')),
        enl: !!(root.querySelector('input[name="heent__tonsil_' + side + '_enl"]:checked'))
      };
    }

    function heentSameTonsilProfile(a, b) {
      return a.ery === b.ery && a.exo === b.exo && a.enl === b.enl;
    }

    function getHeentOralMouthParts(mBlock) {
      var parts = [];
      var oral = mBlock.querySelector('input[name="heent__oral_cavity_vis"]:checked');
      if (oral && oral.value === 'Oral cavity not visualised') {
        parts.push('Unable to visualise oral cavity');
        return parts;
      }
      if (!oral || oral.value !== 'Pharynx visualised') return parts;

      var tons = mBlock.querySelector('input[name="heent__tonsils_vis"]:checked');
      if (tons && tons.value === 'Tonsils NAD') {
        parts.push('Tonsils NAD');
      } else if (tons && tons.value === 'Tonsils not visible') {
        parts.push('tonsils not visible');
      } else if (tons && tons.value === 'Tonsils visible') {
        var L = heentReadTonsilSide(mBlock, 'L');
        var R = heentReadTonsilSide(mBlock, 'R');
        var anyL = L.ery || L.exo || L.enl;
        var anyR = R.ery || R.exo || R.enl;
        if (anyL && anyR && heentSameTonsilProfile(L, R)) {
          var bil = heentTonsilBilateralPhrase(L.ery, L.exo, L.enl);
          if (bil) parts.push(bil);
        } else {
          var pl = heentTonsilSidePhrase('left', L.ery, L.exo, L.enl);
          var pr = heentTonsilSidePhrase('right', R.ery, R.exo, R.enl);
          if (pl) parts.push(pl);
          if (pr) parts.push(pr);
        }
        var qL = mBlock.querySelector('input[name="heent__quincy_L"]:checked');
        var qR = mBlock.querySelector('input[name="heent__quincy_R"]:checked');
        if (qL && qR) parts.push('Appearance of quincy bilaterally');
        else if (qL) parts.push('Appearance of quincy to left side');
        else if (qR) parts.push('Appearance of quincy to right side');
      }

      var ynPfx = 'heent__oral_yn';
      for (var yi = 0; yi < HEENT_ORAL_YN_ROWS.length; yi++) {
        var yr = HEENT_ORAL_YN_ROWS[yi];
        var yesEl = document.getElementById(ynPfx + '__' + yr.key + '__yes');
        var noEl = document.getElementById(ynPfx + '__' + yr.key + '__no');
        if (yesEl && yesEl.checked) parts.push(yr.yes);
        else if (noEl && noEl.checked) parts.push(yr.no);
      }
      return parts;
    }

    function getHeentOutputLines(abnormalCollector) {
      var root = document.getElementById('heentBlock');
      if (!root) return { lines: [], severity: 'normal' };
      var lines = [];
      var heentMainParts = [];
      var heentSeverity = 'normal';
      var findingOrder = ['erythematous', 'bulging', 'perforated', 'purulent'];

      var nad = root.querySelector('input[name="heent__tm_nad"]:checked');
      if (nad && nad.value === 'Tympanic membranes NAD bilaterally') {
        heentMainParts.push('Tympanic membranes NAD bilaterally');
      } else if (nad && nad.value === 'Wax filled ears') {
        heentMainParts.push('Wax filled ear canals, tympanic membranes not visualised');
      } else if (nad && nad.value === 'Tympanic membrane findings') {
        var lcol = root.querySelector('.heent-tm-L-col');
        var rcol = root.querySelector('.heent-tm-R-col');
        var tmBits = [];
        var leftOnly = [];
        var rightOnly = [];
        for (var fi = 0; fi < findingOrder.length; fi++) {
          var fv = findingOrder[fi];
          var lOn = heentTmSideHasFinding(lcol, fv);
          var rOn = heentTmSideHasFinding(rcol, fv);
          if (lOn && rOn) tmBits.push('Tympanic membranes ' + fv + ' bilaterally');
          else if (lOn) leftOnly.push(fv);
          else if (rOn) rightOnly.push(fv);
        }
        var leftDullOn = heentTmSideHasFinding(lcol, 'dull');
        var rightDullOn = heentTmSideHasFinding(rcol, 'dull');
        var leftDullNote = trimSentence(document.getElementById('heent__tm_dull_note_L') ? document.getElementById('heent__tm_dull_note_L').value : '');
        var rightDullNote = trimSentence(document.getElementById('heent__tm_dull_note_R') ? document.getElementById('heent__tm_dull_note_R').value : '');
        function dullPhrase(note) {
          if (!note) return 'dull';
          return 'dull (' + note.toLowerCase() + ')';
        }
        if (leftDullOn && rightDullOn && leftDullNote && rightDullNote && normalizeFindingText(leftDullNote) === normalizeFindingText(rightDullNote)) {
          tmBits.push('Tympanic membranes ' + dullPhrase(leftDullNote) + ' bilaterally');
        } else if (leftDullOn && rightDullOn && !leftDullNote && !rightDullNote) {
          tmBits.push('Tympanic membranes dull bilaterally');
        } else {
          if (leftDullOn) leftOnly.push(dullPhrase(leftDullNote));
          if (rightDullOn) rightOnly.push(dullPhrase(rightDullNote));
        }
        if (leftOnly.length) tmBits.push('Left TM ' + leftOnly.join(' and '));
        if (rightOnly.length) tmBits.push('Right TM ' + rightOnly.join(' and '));
        for (var tb = 0; tb < tmBits.length; tb++) heentMainParts.push(tmBits[tb]);
      }

      var eyeParts = [];
      var photo = root.querySelector('input[name="heent__photo"]:checked');
      if (photo) eyeParts.push(photo.value);
      var pearl = root.querySelector('input[name="heent__pearl"]:checked');
      if (pearl) eyeParts.push(pearl.value);
      var conj = root.querySelector('input[name="heent__conj"]:checked');
      if (conj) eyeParts.push(conj.value);
      for (var ep = 0; ep < eyeParts.length; ep++) heentMainParts.push(eyeParts[ep]);

      var nose = root.querySelector('input[name="heent__nose"]:checked');
      if (nose) heentMainParts.push(nose.value);

      var mBlock = document.getElementById('heentMouthBlock');
      var mouthParts = [];
      if (mBlock) {
        var lips = mBlock.querySelector('input[name="heent__lips"]:checked');
        if (lips) mouthParts.push(lips.value);
        var oralParts = getHeentOralMouthParts(mBlock);
        for (var ap = 0; ap < oralParts.length; ap++) mouthParts.push(oralParts[ap]);
      }
      for (var mp = 0; mp < mouthParts.length; mp++) heentMainParts.push(mouthParts[mp]);

      var neckMenParts = [];
      var neck = root.querySelector('input[name="heent__neck_ln"]:checked');
      if (neck) neckMenParts.push(neck.value);
      var neckMenPfx = 'heent__neck_meningism_yn';
      for (var nmi = 0; nmi < HEENT_NECK_MENINGISM_YN_ROWS.length; nmi++) {
        var nmr = HEENT_NECK_MENINGISM_YN_ROWS[nmi];
        var neckYesEl = document.getElementById(neckMenPfx + '__' + nmr.key + '__yes');
        var neckNoEl = document.getElementById(neckMenPfx + '__' + nmr.key + '__no');
        if (neckYesEl && neckYesEl.checked) neckMenParts.push(nmr.yes);
        else if (neckNoEl && neckNoEl.checked) neckMenParts.push(nmr.no);
      }
      if (heentMainParts.length) {
        heentSeverity = mergeSeverity(heentSeverity, getSeverityFromFindings(heentMainParts));
        lines.push(withSectionPrefix('heent', formatOrderedCommaLine(heentMainParts, abnormalCollector, 'heent'), heentSeverity));
      }
      if (neckMenParts.length) {
        heentSeverity = mergeSeverity(heentSeverity, getSeverityFromFindings(neckMenParts));
        var neckLine = formatOrderedCommaLine(neckMenParts, abnormalCollector, 'heent');
        if (!lines.length) neckLine = withSectionPrefix('heent', neckLine, heentSeverity);
        else neckLine = neckLine;
        lines.push(neckLine);
      }

      var hf = document.getElementById('heent__free');
      var hft = hf ? trimSentence(hf.value) : '';
      if (hft) {
        if (lines.length) {
          var base = trimSentence(lines[0].replace(/^(?:⚠️\s+|\*\*\s+)?(?:HEENT:\s*)?/i, ''));
          lines[0] = withSectionPrefix('heent', sentenceCase(trimSentence(base + ', ' + hft)) + '.', heentSeverity);
        } else {
          lines.push(withSectionPrefix('heent', sentenceCase(hft) + '.', 'normal'));
        }
      }

      return { lines: lines, severity: heentSeverity };
    }

    function clearMskShoulderFields() {
      var mskBlock = document.getElementById('mskBlock');

      var all = mskBlock.querySelectorAll('[name^="msk__shoulder__"]');
      for (var i = 0; i < all.length; i++) {
        var el = all[i];
        if (el.name === 'msk__shoulder__nad') continue;
        if (el.type === 'checkbox' || el.type === 'radio') {
          el.checked = false;
          var lab = el.closest('.check-opt, .yesno-toggle-btn');
          if (lab) lab.classList.remove('selected', 'abnormal', 'pill-normal');
        }
      }
      var ynShoulder = mskBlock.querySelectorAll('input[type="checkbox"][id^="msk__shoulder__"]');
      for (var y = 0; y < ynShoulder.length; y++) {
        var ye = ynShoulder[y];
        if (ye.id === 'msk__shoulder__nad') continue;
        ye.checked = false;
        var ylab = ye.closest('.yesno-toggle-btn');
        if (ylab) ylab.classList.remove('selected', 'abnormal', 'pill-normal');
      }
      var tas = mskBlock.querySelectorAll('textarea[id^="msk__shoulder__"]');
      for (var t = 0; t < tas.length; t++) tas[t].value = '';
      syncYesNoToggleAllRows();
      updateMskShoulderPanels();
    }

    function collectMskShoulderSidePhrases(side, sideWord) {
      var parts = [];
      var insPrefix = 'msk__shoulder__' + side + '__inspection';
      function ynAt(prefix, rowKey, yesPhrase, noPhrase, tagYes, tagNo) {
        var yEl = document.getElementById(prefix + '__' + rowKey + '__yes');
        var nEl = document.getElementById(prefix + '__' + rowKey + '__no');
        if (yEl && yEl.checked) parts.push(makeTaggedFinding(yesPhrase, tagYes));
        else if (nEl && nEl.checked) parts.push(makeTaggedFinding(noPhrase, tagNo));
      }
      function ynOut(rowKey, yesPhrase, noPhrase, tagYes, tagNo) {
        ynAt(insPrefix, rowKey, yesPhrase, noPhrase, tagYes, tagNo);
      }
      ynOut('deformity', sideWord + ' Shoulder deformed', 'No ' + sideWord + ' shoulder deformity', TAG_ABNORMAL, TAG_NORMAL);
      var wYes = document.getElementById(insPrefix + '__wounds__yes');
      var wNo = document.getElementById(insPrefix + '__wounds__no');
      if (wYes && wYes.checked) {
        var wNote = trimSentence(document.getElementById('msk__shoulder__' + side + '__wounds_note') ? document.getElementById('msk__shoulder__' + side + '__wounds_note').value : '');
        var wTxt = 'wound to ' + sideWord + ' shoulder';
        if (wNote) wTxt += ' ' + wNote;
        parts.push(makeTaggedFinding(wTxt, TAG_ABNORMAL));
      } else if (wNo && wNo.checked) {
        parts.push(makeTaggedFinding('No ' + sideWord + ' shoulder wounds', TAG_NORMAL));
      }
      ynOut('swelling', sideWord + ' shoulder swollen', 'No ' + sideWord + ' shoulder swelling', TAG_ABNORMAL, TAG_NORMAL);
      ynOut('subluxation', sideWord + ' Shoulder appears subluxed', 'No apparent ' + sideWord + ' shoulder subluxation', TAG_ABNORMAL, TAG_NORMAL);

      var palPrefix = 'msk__shoulder__' + side + '__palpation';
      var bY = document.getElementById(palPrefix + '__bonyTenderness__yes');
      var bN = document.getElementById(palPrefix + '__bonyTenderness__no');
      if (bY && bY.checked) {
        var bSites = [];
        for (var bi = 0; bi < MSK_SHOULDER_BONY_SITES.length; bi++) {
          var bCb = document.querySelector('input[name="msk__shoulder__' + side + '__bony__' + bi + '"]:checked');
          if (bCb) bSites.push(bCb.value);
        }
        var bLine = bSites.length
          ? sideWord + ' shoulder bony tenderness to ' + bSites.join(', ')
          : sideWord + ' shoulder bony tenderness';
        parts.push(makeTaggedFinding(bLine, TAG_ABNORMAL));
      } else if (bN && bN.checked) {
        parts.push(makeTaggedFinding('No ' + sideWord + ' shoulder bony tenderness', TAG_NORMAL));
      }
      var sY = document.getElementById(palPrefix + '__softTissueTenderness__yes');
      var sN = document.getElementById(palPrefix + '__softTissueTenderness__no');
      if (sY && sY.checked) {
        var sSites = [];
        for (var sj = 0; sj < MSK_SHOULDER_SOFT_SITES.length; sj++) {
          var sCb = document.querySelector('input[name="msk__shoulder__' + side + '__soft__' + sj + '"]:checked');
          if (sCb) sSites.push(sCb.value);
        }
        var sLine = sSites.length
          ? sideWord + ' shoulder soft tissue tenderness over ' + sSites.join(', ')
          : sideWord + ' shoulder soft tissue tenderness';
        parts.push(makeTaggedFinding(sLine, TAG_ABNORMAL));
      } else if (sN && sN.checked) {
        parts.push(makeTaggedFinding('No ' + sideWord + ' shoulder soft tissue tenderness', TAG_NORMAL));
      }

      var romPrefix = 'msk__shoulder__' + side + '__rom';
      ynAt(romPrefix, 'normalRom', sideWord + ' shoulder normal ROM', sideWord + ' shoulder ROM limited or abnormal', TAG_NORMAL, TAG_ABNORMAL);

      var nvPrefix = 'msk__shoulder__' + side + '__neurovascular';
      ynAt(nvPrefix, 'sensationIntact', sideWord + ' shoulder sensation intact', sideWord + ' shoulder sensation not intact', TAG_NORMAL, TAG_ABNORMAL);
      ynAt(nvPrefix, 'capillaryRefill', sideWord + ' shoulder capillary refill <2 s', sideWord + ' shoulder capillary refill prolonged or >=2 s', TAG_NORMAL, TAG_ABNORMAL);
      ynAt(nvPrefix, 'pulsesNormal', sideWord + ' shoulder pulses normal', sideWord + ' shoulder pulses abnormal', TAG_NORMAL, TAG_ABNORMAL);

      return parts;
    }

      return panel;
    }

    function setCheckboxState(input, checked) {
      if (!input) return;
      var changed = input.checked !== checked;
      input.checked = checked;
      var lab = input.closest('.check-opt');
      if (lab) {
        if (checked) {
          lab.classList.add('selected');
          if (input.name && input.name.indexOf('__nad') !== -1) {
            lab.classList.add('pill-normal');
            lab.classList.remove('abnormal');
          } else if (input.getAttribute && input.getAttribute('data-tag') === TAG_NORMAL) {
            lab.classList.add('pill-normal');
            lab.classList.remove('abnormal');
          }
        } else {
          lab.classList.remove('selected', 'abnormal', 'pill-normal');
        }
      }
      return changed;
    }

    function mskSubsectionHasCheckedFindings(subKey) {

    function getMskOutputLines(abnormalCollector) {
      var mskBlock = document.getElementById('mskBlock');
      if (!mskBlock) return { lines: [], severity: 'normal' };
      var mskParts = [];
      var nadLabels = [];
      var quickScreenPhrases = [];
      var mskSeverity = 'normal';
      var allSubs = getMskAllSubsections();

      for (var qi = 0; qi < MSK_QUICK_SCREEN_ITEMS.length; qi++) {
        var qItem = MSK_QUICK_SCREEN_ITEMS[qi];
        var qEl = document.getElementById('msk__quickscreen__' + qItem.key);
        if (qEl && qEl.checked) {
          quickScreenPhrases.push(qItem.value.toLowerCase());
        }
      }

      for (var si = 0; si < allSubs.length; si++) {
        var sub = allSubs[si];

        var nadEl = mskBlock.querySelector('#msk__' + sub.key + '__nad');
        if (nadEl && nadEl.checked) {
          nadLabels.push(sub.label.toLowerCase());
          continue;
        }

        if (sub.useShoulderCustomUi) {
          var rPh = collectMskShoulderSidePhrases('R', 'right');
          var lPh = collectMskShoulderSidePhrases('L', 'left');
          var shAll = rPh.concat(lPh);
          if (shAll.length) {
            var shOrd = reorderPhrases(shAll);
            var shLine = formatFindingsLine(shOrd, abnormalCollector, 'msk');
            if (shLine) {
              mskSeverity = mergeSeverity(mskSeverity, getSeverityFromFindings(shOrd));
              mskParts.push('Shoulder: ' + shLine);
            }
          }
          continue;
        }

        if (sub.bilateral) {
          var rChecked = mskBlock.querySelectorAll('input[name^="msk__' + sub.key + '__R__"]:checked');
          var lChecked = mskBlock.querySelectorAll('input[name^="msk__' + sub.key + '__L__"]:checked');
          if (!rChecked.length && !lChecked.length) continue;

          var rVals = {};
          for (var ri = 0; ri < rChecked.length; ri++) rVals[rChecked[ri].value] = rChecked[ri].getAttribute('data-tag');
          var lVals = {};
          for (var li = 0; li < lChecked.length; li++) lVals[lChecked[li].value] = lChecked[li].getAttribute('data-tag');

          var allKeys = {};
          for (var rv in rVals) allKeys[rv] = true;
          for (var lv in lVals) allKeys[lv] = true;

          var subPhrases = [];
          for (var fk = 0; fk < sub.findings.length; fk++) {
            var fVal = sub.findings[fk].value;
            if (!allKeys[fVal]) continue;
            var inR = !!rVals[fVal];
            var inL = !!lVals[fVal];
            var tag = sub.findings[fk].tag;
            if (inR && inL) {
              subPhrases.push(makeTaggedFinding('bilateral ' + fVal.toLowerCase(), tag));
            } else if (inR) {
              subPhrases.push(makeTaggedFinding('right ' + fVal.toLowerCase(), tag));
            } else {
              subPhrases.push(makeTaggedFinding('left ' + fVal.toLowerCase(), tag));
            }
          }
          if (subPhrases.length) {
            var subLine = formatFindingsLine(reorderPhrases(subPhrases), abnormalCollector, 'msk');
            var subSev = getSeverityFromFindings(subPhrases);
            mskSeverity = mergeSeverity(mskSeverity, subSev);
            mskParts.push(sub.label + ': ' + subLine);
          }
        } else {
          var mChecked = mskBlock.querySelectorAll('input[name^="msk__' + sub.key + '__M__"]:checked');
          if (!mChecked.length) continue;
          var midPhrases = [];
          for (var mi = 0; mi < mChecked.length; mi++) {
            midPhrases.push(makeTaggedFinding(mChecked[mi].value, mChecked[mi].getAttribute('data-tag')));
          }
          var midLine = formatFindingsLine(reorderPhrases(midPhrases), abnormalCollector, 'msk');
          var midSev = getSeverityFromFindings(midPhrases);
          mskSeverity = mergeSeverity(mskSeverity, midSev);
          mskParts.push(sub.label + ': ' + midLine);
        }
      }

      var freeText = trimSentence(document.getElementById('msk__free') ? document.getElementById('msk__free').value : '');

      var leadParts = [];
      if (quickScreenPhrases.length) {
        leadParts.push(sentenceCase(quickScreenPhrases.join(', ')));
      }
      if (nadLabels.length) {
        var nadJoined;
        if (nadLabels.length === 1) nadJoined = sentenceCase(nadLabels[0]) + ' NAD';
        else if (nadLabels.length === 2) nadJoined = sentenceCase(nadLabels[0] + ' and ' + nadLabels[1]) + ' NAD';
        else {
          var last = nadLabels[nadLabels.length - 1];
          nadJoined = sentenceCase(nadLabels.slice(0, -1).join(', ') + ' and ' + last) + ' NAD';
        }
        leadParts.push(nadJoined);
      }

      var orderedParts = leadParts.concat(mskParts);
      if (freeText) orderedParts.push(sentenceCase(freeText));

      if (!orderedParts.length) return { lines: [], severity: 'normal' };
      if (abnormalsOnly && mskSeverity === 'normal') return { lines: [], severity: 'normal' };

      var lineParts = [];
      for (var pi = 0; pi < orderedParts.length; pi++) {
        var partText = typeof orderedParts[pi] === 'object' ? getFindingText(orderedParts[pi]) : orderedParts[pi];
        if (partText) lineParts.push(trimSentence(partText));
      }

      var marker = '';
      if (showSeverityMarkers) {
        if (mskSeverity === 'urgent') marker = '⚠️ ';
        else if (mskSeverity === 'abnormal') marker = '** ';
      }
      var mskBody = lineParts.join('. ') + '.';
      var lead = includeSystemPrefixes ? 'MSK: ' : 'Musculoskeletal: ';
      var outputLine = marker + lead + capitaliseFirst(mskBody);

      return { lines: [outputLine], severity: mskSeverity };
    }

    function trimSentence(text) {
      return (text || '').trim().replace(/[.,;:\s]+$/g, '');
    }

    function sentenceCase(text) {
      if (!text) return '';
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function severityRank(severity) {
      if (severity === 'urgent') return 2;
      if (severity === 'abnormal') return 1;
      return 0;
    }

    function mergeSeverity(current, next) {
      return severityRank(next) > severityRank(current) ? next : current;
    }

    function getSeverityFromFindings(findings) {
      var severity = 'normal';
      if (!findings || !findings.length) return severity;
      for (var i = 0; i < findings.length; i++) {
        var text = getFindingText(findings[i]);
        var tag = (findings[i] && typeof findings[i] === 'object') ? findings[i].tag : '';
        var cls = classFromTaggedFinding(text, tag);
        severity = mergeSeverity(severity, cls === 'urgent' ? 'urgent' : (cls === 'abnormal' ? 'abnormal' : 'normal'));
      }
      return severity;
    }

    var includeSystemPrefixes = false;
    var showSeverityMarkers = true;
    var showAbnormalSummary = true;
    var abnormalsOnly = false;
    var expandAbbreviations = false;

    function withSectionPrefix(sectionKey, lineText, severity) {
      var body = trimSentence(lineText || '');
      if (!body) return '';
      var prefix = OUTPUT_SECTION_PREFIX_MAP[sectionKey];
      var marker = '';
      if (showSeverityMarkers) {
        if (severity === 'urgent') marker = '⚠️ ';
        else if (severity === 'abnormal') marker = '** ';
      }
      if (!includeSystemPrefixes || !prefix) {
        if (sectionKey === 'abdomen' && body.toLowerCase().indexOf('abdomen ') !== 0) {
          var proseBody = body;
          if (/^[A-Z]/.test(proseBody)) proseBody = proseBody.charAt(0).toLowerCase() + proseBody.slice(1);
          return marker + 'Abdomen ' + proseBody + '.';
        }
        return marker + capitaliseFirst(body) + '.';
      }
      return marker + prefix + ': ' + capitaliseFirst(body) + '.';
    }

    var ABBREVIATION_EXPANSIONS = [
      { pattern: /\bHS I \+ II\b/g, replace: 'Heart sounds I and II' },
      { pattern: /\bTMs\b/g, replace: 'tympanic membranes' },
      { pattern: /\bTM\b/g, replace: 'tympanic membrane' },
      { pattern: /\bCRT\b/g, replace: 'capillary refill time' },
      { pattern: /\bWOB\b/g, replace: 'work of breathing' },
      { pattern: /\bROM\b/g, replace: 'range of movement' },
      { pattern: /\bATNR\b/g, replace: 'asymmetric tonic neck reflex' },
      { pattern: /\bPEARL\b/g, replace: 'pupils equal and reactive to light' },
      { pattern: /\bNAD\b/g, replace: 'no abnormality detected' },
      { pattern: /\bHEENT\b/g, replace: 'Head, eyes, ears, nose and throat' },
      { pattern: /\bEOB\b/g, replace: 'End-of-bed observations' },
      { pattern: /\bCVS\b/g, replace: 'Cardiovascular' },
      { pattern: /\bRESP\b/g, replace: 'Respiratory' },
      { pattern: /\bABDO\b/g, replace: 'Abdomen' },
      { pattern: /\bMSK\b/g, replace: 'Musculoskeletal' },
      { pattern: /\bSKIN\b/g, replace: 'Skin' }
    ];

    function formatExamTimestamp() {
      var now = new Date();
      var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
      var day = pad(now.getDate());
      var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      var month = months[now.getMonth()];
      var year = now.getFullYear();
      var hh = pad(now.getHours());
      var mm = pad(now.getMinutes());
      return day + ' ' + month + ' ' + year + ' at ' + hh + ':' + mm;
    }

    function applyAbbreviationExpansions(text) {
      if (!text) return text;
      var out = text;
      for (var i = 0; i < ABBREVIATION_EXPANSIONS.length; i++) {
        out = out.replace(ABBREVIATION_EXPANSIONS[i].pattern, ABBREVIATION_EXPANSIONS[i].replace);
      }
      return out;
    }

    function reorderPhrases(phrases) {
      var abnormals = [];
      var normals = [];
      var neutrals = [];
      for (var i = 0; i < phrases.length; i++) {
        var text = getFindingText(phrases[i]);
        var entryTag = (phrases[i] && typeof phrases[i] === 'object') ? phrases[i].tag : '';
        var cls = classFromTaggedFinding(text, entryTag);
        if (cls === 'abnormal') abnormals.push(phrases[i]);
        else if (cls === 'urgent') abnormals.push(phrases[i]);
        else if (cls === 'normal') normals.push(phrases[i]);
        else neutrals.push(phrases[i]);
      }
      return abnormals.concat(neutrals, normals);
    }

    function formatOrderedCommaLine(parts, abnormalCollector, systemKey) {
      if (!parts || !parts.length) return '';
      var taggedParts = [];
      for (var i = 0; i < parts.length; i++) {
        if (parts[i] && typeof parts[i] === 'object' && Object.prototype.hasOwnProperty.call(parts[i], 'text')) taggedParts.push(parts[i]);
        else taggedParts.push(makeTaggedFinding(parts[i], resolveFindingTagLabel(parts[i])));
      }
      var ordered = reorderPhrases(taggedParts);
      return formatFindingsLine(ordered, abnormalCollector, systemKey);
    }

    function syncYesNoToggleRowStyles(row) {
      if (!row) return;
      var key = row.getAttribute('data-row-key');
      var wrap = row.closest('[data-yesno-prefix]');
      if (!wrap) return;
      var prefix = wrap.getAttribute('data-yesno-prefix');
      var rowsDef = YES_NO_TOGGLE_ROW_REGISTRY[prefix];
      if (!rowsDef) return;
      var def = null;
      for (var si = 0; si < rowsDef.length; si++) {
        if (rowsDef[si].key === key) {
          def = rowsDef[si];
          break;
        }
      }
      if (!def) return;
      var yesLbl = row.querySelector('.yesno-toggle-btn--yes');
      var noLbl = row.querySelector('.yesno-toggle-btn--no');
      var yesInp = yesLbl ? yesLbl.querySelector('input') : null;
      var noInp = noLbl ? noLbl.querySelector('input') : null;
      if (yesLbl) yesLbl.classList.remove('selected', 'pill-normal', 'abnormal');
      if (noLbl) noLbl.classList.remove('selected', 'pill-normal', 'abnormal');
      if (yesInp && yesInp.checked && yesLbl) {
        yesLbl.classList.add('selected');
        yesLbl.classList.add(ynPillClassFromInput(yesInp, def.normalYes));
      }
      if (noInp && noInp.checked && noLbl) {
        noLbl.classList.add('selected');
        noLbl.classList.add(ynPillClassFromInput(noInp, !def.normalYes));
      }

    function handleYesNoToggleClick(label, ev) {
      if (ev && typeof ev.preventDefault === 'function') ev.preventDefault();
      var isYes = label.classList.contains('yesno-toggle-btn--yes');
      var row = label.closest('.yesno-toggle-row');
      if (!row) return;

      if (!wrap) return;
      var prefix = wrap.getAttribute('data-yesno-prefix');
      var yesInp = document.getElementById(prefix + '__' + key + '__yes');
      var noInp = document.getElementById(prefix + '__' + key + '__no');
      if (!yesInp || !noInp) return;
      if (isYes) {
        if (yesInp.checked) yesInp.checked = false;
        else {
          yesInp.checked = true;
          noInp.checked = false;
        }
      } else {
        if (noInp.checked) noInp.checked = false;
        else {
          noInp.checked = true;
          yesInp.checked = false;
        }
      }
      syncYesNoToggleRowStyles(row);
