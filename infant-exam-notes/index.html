<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <meta name="color-scheme" content="dark light">
  <title>Examination Notes</title>
  <link rel="stylesheet" href="../css/app-theme.css">
  <link rel="stylesheet" href="../css/style-variants.css">
  <script src="../js/style-system.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <style>
    /* ===== GLOBAL SPACING TOKENS ===== */
    :root {
      --sp-within: 6px;   /* gap between sibling elements inside a group */
      --sp-group: 8px;    /* gap between groups within a section */
      --sp-section: 12px; /* gap between section cards */
    }

    .exam-container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 calc(16px + var(--safe-r)) 110px calc(16px + var(--safe-l));
    }
    .exam-container > header.app-header-center h1 {
      font-size: 2.275rem;
    }
    @media (max-width: 600px) {
      .exam-container > header.app-header-center h1 { font-size: 1.95rem; }
    }
    @media (min-width: 900px) {
      .exam-container { max-width: 1024px; }
    }

    /* ===== SECTION GROUPS GRID ===== */
    .section-groups-grid {
      display: grid;
      gap: var(--sp-group) 12px;
      grid-template-columns: 1fr;
      align-items: start;
    }
    /* Up to 2 columns when the card is wide enough; neurology stays single-column */
    @container section-card (min-width: 34rem) {
      .section-groups-grid:not(.section-groups-grid--single) {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .section-groups-grid .span-full { grid-column: 1 / -1; }
    }
    /* Viewport fallback where container queries are not applied */
    @media (min-width: 640px) {
      .section-groups-grid:not(.section-groups-grid--single) {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .section-groups-grid .span-full { grid-column: 1 / -1; }
    }
    .section-groups-grid--single { grid-template-columns: 1fr !important; }

    /* ===== SECTION CARD ===== */
    .section-card {
      container-type: inline-size;
      container-name: section-card;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: var(--sp-section);
    }
    .section-card .sec-heading {
      font-size: 1.138rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-card .sec-heading .sec-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      height: auto;
      background: transparent;
      color: inherit;
      border-radius: 0;
      font-size: 1.05em;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ===== GROUP ROW / LABEL ===== */
    .group-row { margin-bottom: var(--sp-group); }
    .group-row:last-of-type { margin-bottom: 4px; }
    .group-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== PILL BUTTONS (radio) ===== */
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-within);
    }
    .pill-opt {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      min-height: 36px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
      white-space: nowrap;
      box-sizing: border-box;
    }
    @media (max-width: 600px) {
      .pill-opt { min-height: 44px; padding: 8px 12px; }
    }
    .pill-opt:hover { border-color: var(--accent); color: var(--text); }
    .pill-opt input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .pill-opt.selected { border-color: var(--accent); background: rgba(36,170,204,0.12); color: var(--accent); font-weight: 600; }
    .pill-opt.selected.abnormal { border-color: var(--danger); background: rgba(239,68,68,0.1); color: var(--danger); }
    .pill-opt.selected.pill-normal { border-color: var(--success); background: rgba(34,197,94,0.12); color: var(--success); }

    /* ===== CHECK BUTTONS (checkbox) ===== */
    .check-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: var(--sp-within);
    }
    .check-opt {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      min-height: 36px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
      box-sizing: border-box;
    }
    @media (max-width: 600px) {
      .check-opt { min-height: 44px; padding: 8px 12px; }
    }
    .check-opt:hover { border-color: var(--accent); color: var(--text); }
    .check-opt input {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px;
      border: 2px solid var(--border); border-radius: 4px;
      background: var(--surface); cursor: pointer; flex-shrink: 0;
      position: relative; transition: border-color 0.15s, background 0.15s;
    }
    .check-opt input:checked { border-color: var(--accent); background: var(--accent); }
    .check-opt input:checked::after {
      content: ""; position: absolute; left: 3px; top: 1px;
      width: 5px; height: 8px;
      border: solid var(--accent-on); border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .check-opt.selected { border-color: var(--accent); color: var(--text); background: rgba(36,170,204,0.06); }
    .check-opt.selected.abnormal { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.06); }
    .check-opt.selected.pill-normal { border-color: var(--success); color: var(--success); background: rgba(34,197,94,0.06); }

    /* ===== FREE TEXT ===== */
    .free-text-field { margin-top: var(--sp-group); }
    .free-text-field textarea {
      width: 100%; background: var(--surface2);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 8px 10px; color: var(--text);
      font-size: 0.875rem; font-family: inherit;
      resize: vertical; min-height: 34px;
      transition: border-color 0.15s; box-sizing: border-box;
    }
    .free-text-field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
    .free-text-field textarea::placeholder { color: var(--muted); font-size: 0.8rem; }
    .conditional-inline-field { display: none; margin-top: 4px; }
    .conditional-inline-field.show { display: block; }
    .auscultation-added-panel {
      border: 1px solid var(--border); border-radius: 8px; background: var(--surface2);
      padding: 4px 6px 6px;
    }
    .auscultation-other-field { margin-top: 6px; }
    .auscultation-other-field textarea {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 6px 8px; color: var(--text); font-size: 0.875rem; font-family: inherit;
      resize: vertical; min-height: 32px; box-sizing: border-box;
    }
    .auscultation-other-field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }

    /* ===== EXTRA (COLLAPSIBLE) SECTIONS ===== */
    .extra-sections { margin-top: var(--sp-section); }
    .extra-sections details { margin-bottom: 6px; }
    .extra-sections summary {
      cursor: pointer; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      font-weight: 600; font-size: 1.138rem; color: var(--text);
      list-style: none; display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
      transition: border-color 0.15s, background 0.15s; user-select: none;
    }
    .extra-sections summary::-webkit-details-marker { display: none; }
    .extra-sections summary::after { content: "\25B6"; font-size: 0.78rem; color: var(--muted); transition: transform 0.2s; }
    .extra-sections details[open] > summary::after { transform: rotate(90deg); }
    .extra-sections summary:hover { border-color: var(--accent); }
    .extra-sections details[open] > summary { border-radius: var(--radius) var(--radius) 0 0; border-bottom-color: transparent; }
    .extra-sections details > .section-card { border-top: none; border-radius: 0 0 var(--radius) var(--radius); margin-bottom: 0; }

    /* ===== OUTPUT PANEL ===== */
    .output-panel {
      position: sticky; bottom: 0; z-index: 50;
      background: var(--bg); border-top: 1px solid var(--border);
      padding: 10px 0 calc(10px + var(--safe-b));
      margin: 0 calc(-16px - var(--safe-r)) 0 calc(-16px - var(--safe-l));
      padding-left: calc(16px + var(--safe-l));
      padding-right: calc(16px + var(--safe-r));
    }
    .output-inner { max-width: 780px; margin: 0 auto; }
    @media (min-width: 900px) { .output-inner { max-width: 1024px; } }
    .output-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .output-toggle-title { font-size: 1.138rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }
    .output-actions { display: flex; gap: 6px; align-items: center; }
    .output-actions button {
      padding: 6px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s, background 0.15s; min-height: 30px;
    }
    .output-actions button:hover { border-color: var(--accent); }
    .output-actions .copy-btn { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
    .output-actions .copy-btn:hover { background: var(--accent2); }
    .output-actions .copy-btn.copied { background: var(--success); border-color: var(--success); }
    .output-body {
      margin-top: 8px; font-size: 0.875rem; line-height: 1.55;
      color: var(--text); white-space: pre-wrap;
      min-height: 60px; max-height: 40vh; overflow-y: auto;
      padding: 10px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
    }
    .output-body.empty { color: var(--muted); font-style: italic; text-align: center; padding: 14px; min-height: 60px; }
    .output-collapsed .output-body { display: none; }

    /* ===== LUNG MAP ===== */
    .lung-map-wrap { margin-top: var(--sp-group); }
    .lung-map-details {
      border: 1px solid var(--border); border-radius: 10px; background: var(--surface2); overflow: hidden;
    }
    .lung-map-details > summary {
      cursor: pointer; padding: 8px 10px; font-size: 0.875rem; font-weight: 600; color: var(--text);
      list-style: none; display: flex; align-items: center; justify-content: space-between; gap: 6px;
      user-select: none; background: var(--surface2); transition: background 0.15s;
    }
    .lung-map-details > summary::-webkit-details-marker { display: none; }
    .lung-map-details > summary::after {
      content: "\25B6"; font-size: 0.65rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0;
    }
    .lung-map-details[open] > summary::after { transform: rotate(90deg); }
    .lung-map-details > summary:hover { background: var(--surface); }
    .lung-map-details-body { padding: 6px; border-top: 1px solid var(--border); background: var(--surface2); }
    .lung-map-layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 6px; }
    @media (max-width: 720px) { .lung-map-layout { grid-template-columns: 1fr; } }
    .lung-svg-shell {
      border: 1px solid var(--border); border-radius: 8px; background: var(--surface);
      padding: 4px; width: 100%; max-width: 22.5rem; margin: 0 auto; box-sizing: border-box;
    }
    .lung-svg-shell svg { display: block; width: 100%; height: auto; }
    .lung-zone { cursor: pointer; transition: fill 0.15s, stroke 0.15s; fill: rgba(36,170,204,0.12); stroke: var(--border); stroke-width: 1.5; }
    .lung-zone:hover { stroke: var(--accent); fill: rgba(36,170,204,0.2); }
    .lung-zone.active { stroke: var(--accent); fill: rgba(36,170,204,0.3); }
    .lung-zone.has-findings { stroke: var(--success); fill: rgba(34,197,94,0.2); }
    .lung-zone-label { font-size: 0.875rem; fill: var(--muted); pointer-events: none; font-weight: 500; }
    .lung-picker { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); padding: 6px; }
    .lung-picker-title { font-size: 0.875rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .lung-finding-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .lung-finding-chip {
      display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); border-radius: 999px;
      padding: 4px 8px; min-height: 36px;
      font-size: 0.875rem; font-weight: 500; box-sizing: border-box; cursor: pointer; user-select: none;
    }
    @media (max-width: 600px) { .lung-finding-chip { min-height: 44px; padding: 6px 10px; } }
    .lung-finding-chip input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .lung-finding-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(36,170,204,0.12); font-weight: 600; }
    .lung-summary { margin-top: 4px; font-size: 0.875rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 4px; font-weight: 500; }
    .lung-summary-badge { border: 1px solid var(--border); background: var(--surface); border-radius: 999px; padding: 2px 6px; }
    .lung-zone-note { margin-top: 4px; }
    .lung-zone-note textarea {
      width: 100%; background: var(--surface2);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 4px 6px; color: var(--text);
      font-size: 0.875rem; font-family: inherit;
      resize: vertical; min-height: 28px; box-sizing: border-box;
    }
    .lung-zone-note textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }

    /* ===== HEENT ===== */
    .heent-subblock { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .heent-subblock:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .heent-subtitle { font-size: 0.975rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .heent-tm-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }
    .heent-tm-cols.conditional-inline-field { display: none; }
    .heent-tm-cols.conditional-inline-field.show { display: grid; }
    @media (max-width: 520px) { .heent-tm-cols { grid-template-columns: 1fr; } }
    .heent-col-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .check-grid.heent-tonsils-grid { gap: var(--sp-within); margin-top: 6px; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); }
    .check-grid.heent-meningism-grid { gap: var(--sp-within); }

    .section-hint { font-size: 0.72rem; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">&#9728;&#65039;</button>
  <div class="exam-container">
    <header class="app-header-center">
      <h1>Examination Notes</h1>
      <p>Tool to aid documentation of examination findings</p>
    </header>

    <div id="exam-sections"></div>
  </div>

  <div class="output-panel" id="outputPanel">
    <div class="output-inner">
      <div class="output-toggle" onclick="toggleOutputPanel()">
        <span class="output-toggle-title" id="outputToggleTitle">Examination Note</span>
        <div class="output-actions">
          <button type="button" class="copy-btn" id="copyBtn" onclick="event.stopPropagation(); copyOutput()">Copy</button>
          <button type="button" onclick="event.stopPropagation(); clearAll()">Clear all</button>
        </div>
      </div>
      <div class="output-body empty" id="output">Select findings above to generate the note.</div>
    </div>
  </div>

  <script>
    var SECTIONS = [
      {
        key: 'general',
        label: 'General',
        icon: '🏥',
        groups: [
          { type: 'radio', name: 'state', label: 'Alertness', options: ['Alert', 'Drowsy', 'Irritable', 'Inconsolable'] },
          { type: 'radio', name: 'appearance', label: 'Appearance', options: ['Appears well', 'Appears unwell'] },
          { type: 'radio', name: 'comfort', label: 'Comfort', options: ['Comfortable at rest', 'In distress'] },
          { type: 'radio', name: 'interaction', label: 'Interaction', options: ['Interacting with carer', 'Not interacting'] },
          { type: 'radio', name: 'dysmorphism', label: 'Dysmorphic features', options: ['No dysmorphic features', 'Dysmorphic features'] }
        ]
      },
      {
        key: 'cardiovascular',
        label: 'Cardiovascular',
        icon: '🫀',
        groups: [
          { type: 'radio', name: 'heartMurmur', label: 'Heart sounds / murmur', options: ['HS I + II only', 'Murmur'] },
          { type: 'checkbox', name: 'checks', label: 'Findings', options: ['Femorals palpable and equal', 'No hepatomegaly'] },
          { type: 'radio', name: 'radialPulse', label: 'Radial pulse quality', options: ['Radial pulses normal', 'Radial pulses weak', 'Radial pulses thready', 'Radial pulses bounding'] }
        ],
        freeHint: 'Murmur grade/location/radiation/character'
      },
      {
        key: 'respiratory',
        label: 'Respiratory',
        icon: '🫁',
        groups: [
          { type: 'radio', name: 'wob', label: 'Work of breathing', options: ['No WOB', 'Mild', 'Moderate', 'Severe'] },
          { type: 'radio', name: 'recessionMode', label: 'Recession', options: ['No recessions', 'Recessions present'] },
          { type: 'radio', name: 'trachealTug', label: 'Tracheal tug', options: ['Tracheal tug absent', 'Tracheal tug present'] },
          { type: 'radio', name: 'nasalFlaring', label: 'Nasal flaring', options: ['Nasal flaring absent', 'Nasal flaring present'] },
          { type: 'radio', name: 'grunting', label: 'Grunting', options: ['Grunting absent', 'Grunting present'] },
          { type: 'checkbox', name: 'upperAirwaySounds', label: 'Upper airway sounds', options: ['No upper airway sounds', 'Soft stridor', 'Harsh stridor', 'Stertorous', 'Upper airway secretions audible'] },
          { type: 'radio', name: 'chestAppearance', label: 'Chest appearance', options: ['Good chest rise'] },
          { type: 'radio', name: 'auscultationMode', label: 'Auscultation', options: ['Chest clear', 'Added sounds'] }
        ],
        freeHint: 'Describe cough or added sounds'
      },
      {
        key: 'abdomen',
        label: 'Abdomen',
        icon: '💩',
        groups: [
          { type: 'radio', name: 'consistency', label: 'Consistency', options: ['Soft', 'Rigid'] },
          { type: 'radio', name: 'distension', label: 'Distension', options: ['Non-distended', 'Distended'] },
          { type: 'radio', name: 'tenderness', label: 'Tenderness', options: ['Non-tender', 'Tender'] },
          { type: 'radio', name: 'guarding', label: 'Guarding', options: ['No guarding', 'Guarding present'] },
          { type: 'radio', name: 'bowelSounds', label: 'Bowel sounds', options: ['Bowel sounds present', 'Bowel sounds reduced', 'Bowel sounds absent'] },
          { type: 'checkbox', name: 'peritonitic', label: 'Peritonitic', options: ['Not peritonitic', 'Rebound tenderness', 'Percussion tenderness', 'Able to straight leg raise', 'Single leg stand', 'Able to jump'] },
          { type: 'checkbox', name: 'checks', label: 'Other findings', options: ['No organomegaly', 'No masses', 'Umbilicus normal', 'No inguinal hernias'] }
        ],
        freeHint: 'Localise tenderness, describe hernia'
      },
      {
        key: 'perfusionHydration',
        label: 'Perfusion/Hydration',
        icon: '💧',
        groups: [
          { type: 'radio', name: 'crtCentral', label: 'Capillary refill - Centrally', options: ['<2s', '2-3s', '>3s'] },
          { type: 'radio', name: 'crtPeripheral', label: 'Capillary refill - Peripherally', options: ['<2s', '2-3s', '>3s'] },
          { type: 'radio', name: 'perfusion', label: 'Perfusion', options: ['Warm and well perfused', 'Cool peripherally', 'Shut down'] },
          { type: 'radio', name: 'mucosa', label: 'Mucous membranes', options: ['Moist mucous membranes', 'Dry mucous membranes'] },
          { type: 'radio', name: 'fontanelle', label: 'Fontanelle', options: ['Fontanelle flat', 'Fontanelle bulging', 'Fontanelle sunken'] }
        ],
        freeHint: 'Hydration note if relevant'
      },
      {
        key: 'skin',
        label: 'Skin',
        icon: '💪',
        groups: [
          { type: 'radio', name: 'colour', label: 'Colour', options: ['Pink', 'Pale', 'Jaundiced', 'Mottled', 'Cyanosed'] },
          { type: 'radio', name: 'rash', label: 'Rash', options: ['No rash', 'Rash (blanching)', 'Rash (non-blanching)'] },
          { type: 'radio', name: 'bruising', label: 'Bruising', options: ['No bruising', 'Bruising present'] },
          { type: 'radio', name: 'nappy', label: 'Nappy area', options: ['Nappy area intact', 'Nappy rash present'] },
          { type: 'radio', name: 'perfusion', label: 'Perfusion', options: ['Warm peripheries', 'Cool peripheries'] }
        ],
        freeHint: 'Describe rash or bruising (pattern/location)'
      },
      {
        key: 'neurology',
        label: 'Neurology',
        icon: '🧠',
        groups: [
          { type: 'radio', name: 'correctedAge', label: 'Corrected gestational age', options: ['Corrected age appropriate', 'Corrected age preterm considered'] },
          { type: 'radio', name: 'behaviouralState', label: 'Behavioural state at exam', options: ['Awake and alert', 'Drowsy', 'Quiet sleep', 'Active sleep'] },
          { type: 'radio', name: 'preExamObservation', label: 'Spontaneous activity', options: ['Good spontaneous activity', 'Reduced spontaneous activity', 'No spontaneous activity'] },

          { type: 'checkbox', name: 'cn2', label: 'CN II', options: ['Visual fixation present', 'Visual tracking present', 'Pupillary light response present', 'Pupillary response reduced or absent'] },
          { type: 'checkbox', name: 'cn346', label: 'CN III/IV/VI', options: ['Extraocular movements full', 'Conjugate gaze present', 'Nystagmus absent', 'Nystagmus present'] },

    function isAbnormal(text) {
      var p = (text || '').toLowerCase();
      for (var i = 0; i < ABNORMAL_PATTERNS.length; i++) {
        if (p.indexOf(ABNORMAL_PATTERNS[i]) !== -1) return true;
      }
      return false;
    }

    function isNormal(text) {
      var p = (text || '').toLowerCase();
      for (var i = 0; i < NORMAL_PATTERNS.length; i++) {
        if (p.indexOf(NORMAL_PATTERNS[i]) !== -1) return true;
      }
      return false;
    }

    function classifyFinding(text) {
      var abnormal = isAbnormal(text);
      var normal = isNormal(text);
      if (abnormal && !normal) return 'abnormal';
      if (normal && !abnormal) return 'normal';
      if (abnormal && normal) return 'normal';
      return 'neutral';
    }

    function makeId(sectionKey, groupName, idx) {
      return sectionKey + '__' + groupName + '__' + idx;

    function getLungZoneLabel(zoneKey) {
      for (var i = 0; i < LUNG_ZONES.length; i++) {
        if (LUNG_ZONES[i].key === zoneKey) return LUNG_ZONES[i].label.toLowerCase();
      }
      return zoneKey.replace('_', ' ');
    }

    function toggleLungFinding(zoneKey, finding, selected) {
      var arr = lungZoneState[zoneKey] || [];
      var idx = arr.indexOf(finding);
      if (selected && idx === -1) arr.push(finding);
      if (!selected && idx !== -1) arr.splice(idx, 1);
      lungZoneState[zoneKey] = arr;
      renderLungPickerControls();
      updateOutput();
    }

      lungZoneNotes[zoneKey] = note || '';
      renderLungPickerControls();
      updateOutput();
    }

    function getLungSummaryLine() {
      var parts = [];
      for (var i = 0; i < LUNG_ZONES.length; i++) {
        var zone = LUNG_ZONES[i];
        var findings = lungZoneState[zone.key] || [];
        for (var f = 0; f < findings.length; f++) {
          var finding = findings[f];
          if (finding === 'Vesicular breath sounds') parts.push('vesicular breath sounds at the ' + getLungZoneLabel(zone.key));
          else if (finding === 'Reduced air entry') parts.push('reduced air entry at the ' + getLungZoneLabel(zone.key));
          else if (finding === 'Wheeze') parts.push('wheeze in the ' + getLungZoneLabel(zone.key));
          else if (finding === 'Crackles') parts.push('crackles at the ' + getLungZoneLabel(zone.key));
        }
        var note = trimSentence(lungZoneNotes[zone.key] || '');
        if (note) parts.push(note.toLowerCase() + ' at the ' + getLungZoneLabel(zone.key));
      }
      if (!parts.length) return '';
      return formatOrderedCommaLine(parts);
    }

    function renderLungPickerControls() {
      var zoneTitle = document.getElementById('lungPickerTitle');
      var chipsHost = document.getElementById('lungFindingChips');
      var summaryHost = document.getElementById('lungSummary');
      var noteInput = document.getElementById('lungZoneNoteInput');
      if (!zoneTitle || !chipsHost || !summaryHost || !noteInput) return;

      zoneTitle.textContent = 'Selected zone: ' + getLungZoneLabel(activeLungZone);
      chipsHost.innerHTML = '';
      var selectedFindings = lungZoneState[activeLungZone] || [];
      for (var i = 0; i < LUNG_FINDINGS.length; i++) {
        var finding = LUNG_FINDINGS[i];
        var chip = document.createElement('label');
        chip.className = 'lung-finding-chip';
        var inp = document.createElement('input');
        inp.type = 'checkbox';
        inp.checked = selectedFindings.indexOf(finding) !== -1;
        inp.setAttribute('aria-label', finding + ' for ' + getLungZoneLabel(activeLungZone));
        inp.onchange = (function(zoneKey, findingLabel) {
          return function() { toggleLungFinding(zoneKey, findingLabel, this.checked); };
        })(activeLungZone, finding);
        if (inp.checked) chip.classList.add('selected');
        chip.appendChild(inp);
        chip.appendChild(document.createTextNode(finding));
        chipsHost.appendChild(chip);
      }
      noteInput.value = lungZoneNotes[activeLungZone] || '';
      noteInput.setAttribute('aria-label', 'Free text for ' + getLungZoneLabel(activeLungZone));

      var zoneButtons = document.querySelectorAll('.lung-zone');
      for (var z = 0; z < zoneButtons.length; z++) {
        var zoneKey = zoneButtons[z].getAttribute('data-zone');
        zoneButtons[z].classList.remove('active', 'has-findings');
        if (zoneKey === activeLungZone) zoneButtons[z].classList.add('active');
        if ((lungZoneState[zoneKey] || []).length > 0 || trimSentence(lungZoneNotes[zoneKey] || '')) zoneButtons[z].classList.add('has-findings');
      }

      summaryHost.innerHTML = '';
      for (var j = 0; j < LUNG_ZONES.length; j++) {
        var zone = LUNG_ZONES[j];
        var count = (lungZoneState[zone.key] || []).length;
        var hasNote = !!trimSentence(lungZoneNotes[zone.key] || '');

        summaryHost.appendChild(badge);

      if (!summaryHost.children.length) {
        var none = document.createElement('span');
        none.textContent = 'No lung-zone findings selected yet.';
        summaryHost.appendChild(none);
      }

    function handlePillClick(label, ev) {
      if (ev && typeof ev.preventDefault === 'function') ev.preventDefault();
      var input = label.querySelector('input');
      if (!input) return;
      var row = label.parentElement;
      var siblings = row ? row.querySelectorAll('.pill-opt') : [];
      if (input.checked) {
        input.checked = false;
        for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('selected', 'abnormal', 'pill-normal');
        if (input.name === 'abdomen__tenderness') updateAbdomenTendernessField();
        if (input.name === 'respiratory__recessionMode') updateRecessionSubtypePanel();
        updateOutput();
        return;
      }
      for (var i = 0; i < siblings.length; i++) {
        siblings[i].classList.remove('selected', 'abnormal', 'pill-normal');
        var inp = siblings[i].querySelector('input');
        if (inp) inp.checked = false;
      }
      input.checked = true;
      label.classList.add('selected');
      var v = input.value;
      var n = input.name;
      if (n === 'respiratory__recessionMode' && v === 'No recessions') label.classList.add('pill-normal');
      else if (n === 'respiratory__recessionMode' && v === 'Recessions present') label.classList.add('abnormal');
      else if (n === 'cardiovascular__radialPulse' && v !== 'Radial pulses normal') label.classList.add('abnormal');
      else if (n === 'abdomen__bowelSounds' && v === 'Bowel sounds present') label.classList.add('pill-normal');
      else if (n === 'abdomen__bowelSounds' && (v === 'Bowel sounds reduced' || v === 'Bowel sounds absent')) label.classList.add('abnormal');
      else if (n === 'respiratory__chestAppearance' && v === 'Good chest rise') label.classList.add('pill-normal');
      else if (n === 'respiratory__auscultationMode' && v === 'Chest clear') label.classList.add('pill-normal');
      else if (n === 'respiratory__auscultationMode' && v === 'Added sounds') label.classList.add('abnormal');
      else if (n === 'heent__photo' && v === 'No photophobia') label.classList.add('pill-normal');
      else if (n === 'heent__photo' && v === 'Photophobia present') label.classList.add('abnormal');
      else if (n === 'heent__pearl') label.classList.add('pill-normal');
      else if (n === 'heent__conj' && v === 'Normal conjunctiva') label.classList.add('pill-normal');
      else if (n === 'heent__conj' && (v === 'Conjunctival injection' || v === 'Conjunctival discharge')) label.classList.add('abnormal');
      else if (classifyFinding(v) === 'abnormal') label.classList.add('abnormal');
      else if (classifyFinding(v) === 'normal') label.classList.add('pill-normal');
      if (n === 'abdomen__tenderness') updateAbdomenTendernessField();
      if (n === 'respiratory__recessionMode') {
        updateRecessionSubtypePanel();
        if (v === 'No recessions') clearRecessionSubtypes();
      }
      if (n === 'respiratory__wob') updateRespiratoryWobDependentPanels();
      if (n === 'respiratory__auscultationMode') {
        updateAuscultationAddedPanel();
        if (v === 'Chest clear') clearAuscultationAddedFields();
      }
      if (n === 'cardiovascular__heartMurmur') {
        updateCvMurmurDetailsPanel();
        if (v !== 'Murmur') clearCvMurmurDetailFields();
      }
      if (n === 'heent__tm_nad') {
        updateHeentTmFindingsPanel();
        if (v !== 'Tympanic membrane findings') clearHeentTmFindings();
      }
      updateOutput();
    }

    function getRespiratoryAuscultationLine() {
      var mode = document.querySelector('input[name="respiratory__auscultationMode"]:checked');
      if (!mode) return '';
      if (mode.value === 'Chest clear') {
        return 'On auscultation, chest clear. No added sounds, crackles, or wheeze. Good air entry globally.';
      }
      if (mode.value === 'Added sounds') {
        var parts = [];
        var ausAddedWrap = document.getElementById('respiratoryAuscultationAddedWrap');
        var grid = ausAddedWrap ? ausAddedWrap.querySelector('.auscultation-added-check-grid') : null;
        if (grid) {
          var checked = grid.querySelectorAll('input[type="checkbox"]:checked');
          for (var ci = 0; ci < checked.length; ci++) {
            parts.push('global ' + trimSentence(checked[ci].value).toLowerCase());
          }
        }
        var other = trimSentence(document.getElementById('respiratory__auscultation_other') ? document.getElementById('respiratory__auscultation_other').value : '');
        if (other) parts.push('global ' + other.toLowerCase());
        if (!parts.length) return '';
        return 'On auscultation, ' + parts.join(', ') + '.';
      }
      return '';

    function syncRecessionPresentFromSubtypes() {
      var wrap = document.getElementById('recessionSubtypeWrap');
      if (!wrap) return;
      var any = wrap.querySelector('input[type="checkbox"]:checked');
      if (!any) return;
      var present = document.querySelector('input[name="respiratory__recessionMode"][value="Recessions present"]');
      var none = document.querySelector('input[name="respiratory__recessionMode"][value="No recessions"]');
      if (present) {
        if (none) none.checked = false;
        present.checked = true;
        var row = present.closest('.pill-row');
        if (row) {
          var pills = row.querySelectorAll('.pill-opt');
          for (var i = 0; i < pills.length; i++) {
            pills[i].classList.remove('selected', 'abnormal', 'pill-normal');
            var inp = pills[i].querySelector('input');
            if (inp && inp.checked) {
              pills[i].classList.add('selected', 'abnormal');
            }
          }
        }
        updateRecessionSubtypePanel();
      }
    }

    function handleCheckClick(label) {
      var input = label.querySelector('input');
      setTimeout(function() {
        if (input.name.indexOf('respiratory__upperAirwaySounds__') === 0) {
          var upperWrap = label.closest('.group-row');
          var upperInputs = upperWrap ? upperWrap.querySelectorAll('input[type="checkbox"]') : [];
          if (input.checked && input.value === 'No upper airway sounds') {
            for (var ui = 0; ui < upperInputs.length; ui++) {
              if (upperInputs[ui] === input) continue;
              upperInputs[ui].checked = false;
              var ulab = upperInputs[ui].closest('.check-opt');
              if (ulab) ulab.classList.remove('selected', 'abnormal', 'pill-normal');
            }
          } else if (input.checked && input.value !== 'No upper airway sounds') {
            for (var uj = 0; uj < upperInputs.length; uj++) {
              if (upperInputs[uj].value !== 'No upper airway sounds') continue;
              upperInputs[uj].checked = false;
              var nlab = upperInputs[uj].closest('.check-opt');
              if (nlab) nlab.classList.remove('selected', 'abnormal', 'pill-normal');
            }
          }
        }

        if (input.checked) {
          label.classList.add('selected');
          if (label.closest('.heent-tm-L-col') || label.closest('.heent-tm-R-col')) {
            label.classList.add('abnormal');
            label.classList.remove('pill-normal');
          } else if (label.closest('#recessionSubtypeWrap')) label.classList.add('abnormal');
          else if (label.closest('.auscultation-added-check-grid')) label.classList.add('abnormal');
          else if (classifyFinding(input.value) === 'abnormal') label.classList.add('abnormal');
          else if (classifyFinding(input.value) === 'normal') label.classList.add('pill-normal');
          else label.classList.remove('abnormal', 'pill-normal');
          if (label.closest('#recessionSubtypeWrap')) syncRecessionPresentFromSubtypes();
        } else {
          label.classList.remove('selected', 'abnormal', 'pill-normal');
        }
        updateOutput();
      }, 0);
    }

    function getHeentOutputLines() {
      var root = document.getElementById('heentBlock');
      if (!root) return [];
      var lines = [];
      var findingOrder = ['erythematous', 'bulging', 'perforated', 'purulent'];

      var nad = root.querySelector('input[name="heent__tm_nad"]:checked');
      if (nad && nad.value === 'Tympanic membranes NAD bilaterally') {
        lines.push('Tympanic membranes NAD bilaterally.');
      } else if (nad && nad.value === 'Wax filled ears') {
        lines.push('Wax filled ear canals, tympanic membranes not visualised.');
      } else if (nad && nad.value === 'Tympanic membrane findings') {
        var lcol = root.querySelector('.heent-tm-L-col');
        var rcol = root.querySelector('.heent-tm-R-col');
        var tmBits = [];
        var leftOnly = [];
        var rightOnly = [];
        for (var fi = 0; fi < findingOrder.length; fi++) {
          var fv = findingOrder[fi];
          var lOn = heentTmSideHasFinding(lcol, fv);
          var rOn = heentTmSideHasFinding(rcol, fv);
          if (lOn && rOn) tmBits.push('Tympanic membranes ' + fv + ' bilaterally');
          else if (lOn) leftOnly.push(fv);
          else if (rOn) rightOnly.push(fv);
        }
        if (leftOnly.length) tmBits.push('Left TM ' + leftOnly.join(' and '));
        if (rightOnly.length) tmBits.push('Right TM ' + rightOnly.join(' and '));
        if (tmBits.length) lines.push(formatOrderedCommaLine(tmBits));
      }

      var eyeParts = [];
      var photo = root.querySelector('input[name="heent__photo"]:checked');
      if (photo) eyeParts.push(photo.value);
      var pearl = root.querySelector('input[name="heent__pearl"]:checked');
      if (pearl) eyeParts.push(pearl.value);
      var conj = root.querySelector('input[name="heent__conj"]:checked');
      if (conj) eyeParts.push(conj.value);
      if (eyeParts.length) lines.push(formatOrderedCommaLine(eyeParts));

      var nose = root.querySelector('input[name="heent__nose"]:checked');
      if (nose) lines.push(sentenceCase(nose.value) + '.');

      var mBlock = document.getElementById('heentMouthBlock');
      var mouthParts = [];
      if (mBlock) {
        var lips = mBlock.querySelector('input[name="heent__lips"]:checked');
        if (lips) mouthParts.push(lips.value);
        var ocs = mBlock.querySelectorAll('.heent-oral-grid input[type="checkbox"]:checked');
        for (var ox = 0; ox < ocs.length; ox++) mouthParts.push(ocs[ox].value);
        var tcb = mBlock.querySelectorAll('.heent-tonsils-grid input[type="checkbox"]:checked');
        for (var tx = 0; tx < tcb.length; tx++) {
          if (tcb[tx].value === 'Tonsils enlarged') mouthParts.push('Tonsils appear enlarged');
          else mouthParts.push(tcb[tx].value);
        }
      }
      if (mouthParts.length) lines.push(formatOrderedCommaLine(mouthParts));

      var neckMenParts = [];
      var neck = root.querySelector('input[name="heent__neck_ln"]:checked');
      if (neck) neckMenParts.push(neck.value);
      var mens = root.querySelectorAll('input[name^="heent__men_"]:checked');
      for (var mi = 0; mi < mens.length; mi++) neckMenParts.push(mens[mi].value);
      if (neckMenParts.length) lines.push(formatOrderedCommaLine(neckMenParts));

      var hf = document.getElementById('heent__free');
      var hft = hf ? trimSentence(hf.value) : '';
      if (hft) lines.push(sentenceCase(hft) + '.');

      return lines;
    }

              var l = document.createElement('label');
              l.className = 'pill-opt';
              l.onclick = (function(lbl) { return function(e) { handlePillClick(lbl, e); }; })(l);
              var inp = document.createElement('input');
              inp.type = 'radio';
              inp.name = 'cardiovascular__' + fieldName;
              inp.id = 'cardiovascular__' + fieldName + '__' + i;
              inp.value = options[i];
              l.appendChild(inp);
              l.appendChild(document.createTextNode(options[i]));
              row.appendChild(l);
            }
            murmurWrap.appendChild(row);
          }

          addMurmurCheckGroup('Timing', 'murmurTiming', ['Ejection systolic', 'Pansystolic', 'Diastolic', 'Continuous']);
          addMurmurRadioGroup('Grade', 'murmurGrade', ['1', '2', '3', '4', '5', '6']);
          addMurmurCheckGroup('Location', 'murmurLocation', ['Upper left sternal edge', 'Upper right sternal edge', 'Lower left sternal edge', 'Apex']);
          addMurmurCheckGroup('Radiation', 'murmurRadiation', ['Axilla', 'Carotids', 'Back', 'None']);
          addMurmurCheckGroup('Character', 'murmurCharacter', ['Soft', 'Harsh', 'Blowing', 'Rumbling', 'Vibratory']);
          addMurmurCheckGroup('Pitch', 'murmurPitch', ['Low', 'Medium', 'High']);

          groupsWrap.appendChild(murmurWrap);
        }
      }

      card.appendChild(groupsWrap);

      if (section.key === 'respiratory') {
        card.appendChild(buildLungMapBlock());
      }

      var freeField = document.createElement('div');
      freeField.className = 'free-text-field';
      var freeInput = document.createElement('textarea');
      freeInput.id = section.key + '__free';
      freeInput.rows = 1;
      freeInput.placeholder = section.freeHint || 'Additional details';
      freeInput.addEventListener('input', updateOutput);
      freeField.appendChild(freeInput);
      card.appendChild(freeField);

      return card;
    }

    function renderSections() {
      var host = document.getElementById('exam-sections');
      host.innerHTML = '';
      var sectionMap = {};
      for (var i = 0; i < SECTIONS.length; i++) sectionMap[SECTIONS[i].key] = SECTIONS[i];

      for (var p = 0; p < PRIORITY_KEYS.length; p++) {
        if (sectionMap[PRIORITY_KEYS[p]]) {
          host.appendChild(renderSectionCard(sectionMap[PRIORITY_KEYS[p]]));
        }
      }

      host.appendChild(buildHeentCard());

      var extraWrap = document.createElement('div');
      extraWrap.className = 'extra-sections';
      for (var s = 0; s < SECTIONS.length; s++) {
        var section = SECTIONS[s];
        if (PRIORITY_KEYS.indexOf(section.key) !== -1) continue;

        var details = document.createElement('details');
        var summary = document.createElement('summary');
        summary.textContent = section.label;
        details.appendChild(summary);
        details.appendChild(renderSectionCard(section));
        extraWrap.appendChild(details);
      }
      host.appendChild(extraWrap);
    }

    function trimSentence(text) {
      return (text || '').trim().replace(/[.,;:\s]+$/g, '');
    }

    function sentenceCase(text) {
      if (!text) return '';
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function reorderPhrases(phrases) {
      var abnormals = [];
      var normals = [];
      var neutrals = [];
      for (var i = 0; i < phrases.length; i++) {
        var cls = classifyFinding(phrases[i]);
        if (cls === 'abnormal') abnormals.push(phrases[i]);
        else if (cls === 'normal') normals.push(phrases[i]);
        else neutrals.push(phrases[i]);
      }
      return abnormals.concat(neutrals, normals);
    }

    function formatOrderedCommaLine(parts) {
      if (!parts || !parts.length) return '';
      var ordered = reorderPhrases(parts.slice());
      return sentenceCase(trimSentence(ordered.join(', '))) + '.';
    }

    function updateAbdomenTendernessField() {
      var wrap = document.getElementById('abdomenTenderLocationWrap');
      var input = document.getElementById('abdomen__tender_location');
      var tenderSelected = document.querySelector('input[name="abdomen__tenderness"]:checked');
      var show = !!(tenderSelected && tenderSelected.value === 'Tender');
      if (!wrap || !input) return;
      wrap.classList.toggle('show', show);
      if (!show) input.value = '';
    }

    function buildSectionLine(section) {
      var phrases = [];
      for (var g = 0; g < section.groups.length; g++) {
        var group = section.groups[g];
        if (section.key === 'respiratory' && group.name === 'auscultationMode') continue;
        var selector = group.type === 'radio'
          ? 'input[name="' + section.key + '__' + group.name + '"]:checked'
          : 'input[id^="' + section.key + '__' + group.name + '__"]:checked';
        var selected = document.querySelectorAll(selector);
        var vals = [];
        for (var s = 0; s < selected.length; s++) {
          var rawVal = trimSentence(selected[s].value);
          vals.push(OUTPUT_LABEL_MAP[rawVal] || rawVal);
        }
        if (section.key === 'respiratory' && group.name === 'wob' && vals.length > 0) {
          if (vals[0] === 'No WOB') vals = ['No increased WOB'];
          else vals = [vals[0] + ' WOB'];
        }
        if (section.key === 'respiratory' && group.name === 'recessionMode') {
          var modeRe = document.querySelector('input[name="respiratory__recessionMode"]:checked');
          if (!modeRe) vals = [];
          else if (modeRe.value === 'No recessions') vals = ['No recessions'];
          else {
            var recessionTypes = [];
            var subW = document.getElementById('recessionSubtypeWrap');
            if (subW) {
              var stCbs = subW.querySelectorAll('input[type="checkbox"]:checked');
              for (var st = 0; st < stCbs.length; st++) recessionTypes.push(stCbs[st].value.toLowerCase());
            }
            if (recessionTypes.length > 0) vals = [recessionTypes.join(', ') + ' recessions'];
            else vals = [];
          }
        }
        if (section.key === 'cardiovascular' && group.name === 'heartMurmur' && vals.length > 0 && vals[0] === 'Murmur') {
          vals = ['Murmur present'];
          var murmurDetails = [];
          var timingInputs = document.querySelectorAll('input[id^="cardiovascular__murmurTiming__"]:checked');
          for (var ti = 0; ti < timingInputs.length; ti++) murmurDetails.push(timingInputs[ti].value.toLowerCase());
          var gradeInput = document.querySelector('input[name="cardiovascular__murmurGrade"]:checked');
          if (gradeInput) murmurDetails.push('grade ' + gradeInput.value);
          var locInputs = document.querySelectorAll('input[id^="cardiovascular__murmurLocation__"]:checked');
          var locVals = [];
          for (var li = 0; li < locInputs.length; li++) locVals.push(locInputs[li].value.toLowerCase());
          if (locVals.length) murmurDetails.push('at ' + locVals.join(', '));
          var radInputs = document.querySelectorAll('input[id^="cardiovascular__murmurRadiation__"]:checked');
          var radVals = [];
          for (var ri = 0; ri < radInputs.length; ri++) radVals.push(radInputs[ri].value.toLowerCase());
          if (radVals.length) murmurDetails.push('radiation ' + radVals.join(', '));
          var charInputs = document.querySelectorAll('input[id^="cardiovascular__murmurCharacter__"]:checked');
          var charVals = [];
          for (var ci = 0; ci < charInputs.length; ci++) charVals.push(charInputs[ci].value.toLowerCase());
          if (charVals.length) murmurDetails.push(charVals.join(', '));
          var pitchInputs = document.querySelectorAll('input[id^="cardiovascular__murmurPitch__"]:checked');
          var pitchVals = [];
          for (var pi = 0; pi < pitchInputs.length; pi++) pitchVals.push(pitchInputs[pi].value.toLowerCase() + '-pitched');
          if (pitchVals.length) murmurDetails.push(pitchVals.join(', '));
          if (murmurDetails.length) vals = ['Murmur present (' + murmurDetails.join('; ') + ')'];
        }
        if (section.key === 'perfusionHydration' && (group.name === 'crtCentral' || group.name === 'crtPeripheral') && vals.length > 0) {
          var crtMap = { '<2s': '<2 seconds', '2-3s': '2-3 seconds', '>3s': '>3 seconds' };
          var crtPhrase = crtMap[vals[0]] || vals[0];
          vals = [group.name === 'crtCentral' ? 'Central CRT ' + crtPhrase : 'CRT peripheral ' + crtPhrase];
        }
        if (section.key === 'abdomen' && group.name === 'tenderness' && vals.length > 0 && vals[0] === 'Tender') {
          var tenderLoc = trimSentence(document.getElementById('abdomen__tender_location') ? document.getElementById('abdomen__tender_location').value : '');
          if (tenderLoc) vals = ['Tender ' + tenderLoc];
        }
        if (section.key === 'abdomen' && group.name === 'peritonitic' && vals.length > 0) {
          var periOut = [];
          for (var pv = 0; pv < vals.length; pv++) {
            if (vals[pv] === 'Single leg stand') periOut.push('Able to single leg stand');
            else periOut.push(vals[pv]);
          }
          vals = periOut;
        }
        if (vals.length > 0) {
          if (group.type === 'checkbox') {
            for (var vi = 0; vi < vals.length; vi++) phrases.push(vals[vi]);
          } else {
            phrases.push(vals.join(', '));
          }
        }
      }

      var freeText = trimSentence(document.getElementById(section.key + '__free').value);
      if (freeText) freeText = sentenceCase(freeText);
      if (phrases.length === 0 && !freeText) return '';
      var ordered = reorderPhrases(phrases);
      if (freeText) ordered.push(freeText);
      var lineBody = sentenceCase(trimSentence(ordered.join(', '))) + '.';
      if (section.key === 'abdomen') return 'Abdomen: ' + lineBody;
      return lineBody;
    }

    function updateOutput() {
      var lines = [];
      var sectionMap = {};
      for (var si = 0; si < SECTIONS.length; si++) sectionMap[SECTIONS[si].key] = SECTIONS[si];
      for (var oi = 0; oi < OUTPUT_SECTION_KEYS.length; oi++) {
        var skey = OUTPUT_SECTION_KEYS[oi];
        if (skey === '_heent_') {
          var heentLines = getHeentOutputLines();
          for (var hl = 0; hl < heentLines.length; hl++) lines.push(heentLines[hl]);
          continue;
        }
        var sec = sectionMap[skey];
        if (!sec) continue;
        var line = buildSectionLine(sec);
        if (skey === 'respiratory') {
          if (line) lines.push(line);
          var ausLine = getRespiratoryAuscultationLine();
          if (ausLine) lines.push(ausLine);
          var lungLine = getLungSummaryLine();
          if (lungLine) lines.push(lungLine);
        } else {
          if (line) lines.push(line);
        }
      }
      var outputEl = document.getElementById('output');
      var titleEl = document.getElementById('outputToggleTitle');
      if (lines.length) {
        outputEl.textContent = lines.join('\n');
        outputEl.classList.remove('empty');
        titleEl.textContent = 'Examination Note (' + lines.length + ' system' + (lines.length > 1 ? 's' : '') + ')';
      } else {
        outputEl.textContent = 'Select findings above to generate the note.';
        outputEl.classList.add('empty');
        titleEl.textContent = 'Examination Note';
      }
    }

    var outputExpanded = true;
    function toggleOutputPanel() {
      outputExpanded = !outputExpanded;
      document.getElementById('outputPanel').classList.toggle('output-collapsed', !outputExpanded);
    }

    function copyOutput() {
      var out = document.getElementById('output').textContent;
      if (!out || document.getElementById('output').classList.contains('empty')) return;
      var btn = document.getElementById('copyBtn');

      function copiedState() {
        btn.textContent = 'Copied \u2713';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1500);
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(out).then(copiedState);
      } else {
        var ta = document.createElement('textarea');
        ta.value = out;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copiedState();
      }
    }

    function clearAll() {
      var inputs = document.querySelectorAll('#exam-sections input[type="checkbox"], #exam-sections input[type="radio"]');
      for (var i = 0; i < inputs.length; i++) inputs[i].checked = false;
      var pills = document.querySelectorAll('.pill-opt.selected, .check-opt.selected');
      for (var i = 0; i < pills.length; i++) pills[i].classList.remove('selected', 'abnormal');
      var textareas = document.querySelectorAll('#exam-sections textarea');
      for (var t = 0; t < textareas.length; t++) textareas[t].value = '';
      for (var z = 0; z < LUNG_ZONES.length; z++) {
        lungZoneState[LUNG_ZONES[z].key] = [];
        lungZoneNotes[LUNG_ZONES[z].key] = '';
      }
      activeLungZone = 'right_upper';
      renderLungPickerControls();
      updateAbdomenTendernessField();
      updateRespiratoryWobDependentPanels();
      updateRecessionSubtypePanel();
      updateCvMurmurDetailsPanel();
      clearCvMurmurDetailFields();
      updateHeentTmFindingsPanel();
      clearHeentTmFindings();
      clearAuscultationAddedFields();
      updateAuscultationAddedPanel();
      updateOutput();
    }

    renderSections();
    updateRespiratoryWobDependentPanels();
    updateCvMurmurDetailsPanel();
    updateHeentTmFindingsPanel();
    updateAuscultationAddedPanel();
    var lungZoneEls = document.querySelectorAll('.lung-zone');
    for (var i = 0; i < lungZoneEls.length; i++) {
      lungZoneEls[i].addEventListener('click', function() { setActiveLungZone(this.getAttribute('data-zone')); });
      lungZoneEls[i].addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setActiveLungZone(this.getAttribute('data-zone'));
        }
      });
    }
    renderLungPickerControls();
    updateAbdomenTendernessField();
    updateRecessionSubtypePanel();
    var lungNoteInput = document.getElementById('lungZoneNoteInput');
    if (lungNoteInput) {
      lungNoteInput.addEventListener('input', function() {
        setLungZoneNote(activeLungZone, this.value);
      });
    }
    updateOutput();
  </script>
</body>
</html>
