<?xml version="1.0" encoding="UTF-8"?>
<!--
  James Woodward Lab  app icon.
  Maskable-safe: all content is within the inner 80% safe area (H 410×410
  centered on the 512×512 canvas) so aggressive OS shape masks (iOS squircle,
  Android circle) never crop the glyph.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="James Woodward Lab">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"  stop-color="#0ea5b7"/>
      <stop offset="1"  stop-color="#0b3b55"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6fbff"/>
      <stop offset="1" stop-color="#9be3f4"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Full-bleed rounded square background (safe for maskable). -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner highlight. -->
  <rect x="24" y="24" width="464" height="464" rx="80" ry="80"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Pulse trace glow. -->
  <g filter="url(#soft)" opacity="0.55">
    <path d="M80 300 L190 300 L220 220 L260 380 L300 260 L340 310 L432 310"
          fill="none" stroke="#7ce7f7" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Pulse trace crisp. -->
  <path d="M80 300 L190 300 L220 220 L260 380 L300 260 L340 310 L432 310"
        fill="none" stroke="url(#stroke)" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Monogram "jw"  lowercase for friendliness, offset top-left. -->
  <g font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-weight="700"
     fill="#ffffff" text-anchor="start">
    <text x="96" y="168" font-size="128" letter-spacing="-6">jw</text>
  </g>

  <!-- Dot accent. -->
  <circle cx="428" cy="160" r="18" fill="#ffd166"/>
</svg>
