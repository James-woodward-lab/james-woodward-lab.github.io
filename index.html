<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>James Woodward Lab</title>
  <link rel="stylesheet" href="css/app-theme.css">
  <style>
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .app-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      background: var(--accent);
      color: #0f1117;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      border-radius: var(--radius);
      border: none;
      transition: background 0.2s, transform 0.15s;
      min-height: 52px;
    }
    .app-btn:hover {
      background: var(--accent2);
      transform: translateY(-2px);
    }
    @media (max-width: 500px) {
      .app-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="app-header-center">
    <h1>🩺 James Woodward Lab</h1>
    <p>Paediatric clinical tools & calculators</p>
  </header>
  <div class="card">
    <h2>Tools</h2>
    <div class="app-grid">
      <a href="developmental-milestones/index.html" class="app-btn">Developmental Milestones</a>
      <a href="fluid-calculator/index.html" class="app-btn">Fluid Calculator</a>
      <a href="qtc-calculator/index.html" class="app-btn">QTc Calculator</a>
      <a href="renal-fluid-calculator/index.html" class="app-btn">Renal Fluid Calculator</a>
      <a href="safeguarding-calculator/index.html" class="app-btn">Safeguarding Calculator</a>
      <a href="sbar-generator/index.html" class="app-btn">SBAR Generator</a>
      <a href="seizure-timer/index.html" class="app-btn">Seizure Timer</a>
    </div>
  </div>
  <footer class="app-footer">
    For clinical decision support only. Always verify against local guidelines.
  </footer>
</div>
</body>
</html>
